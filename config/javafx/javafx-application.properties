# JavaFX Application Configuration Properties

# Application Information
app.name=DSA JavaFX Application
app.version=1.0.0
app.title=Data Structures and Algorithms Visualizer
app.vendor=DSA Java Project Team
app.copyright=Copyright © 2024 DSA Java Project Team

# Main Application Settings
app.main.class=com.dsa.javafx.DSAJavaFXApplication
app.theme=material
app.language=en
app.country=US

# Window Configuration
window.title=DSA Algorithms Visualizer
window.width=1200
window.height=800
window.minWidth=800
window.minHeight=600
window.resizable=true
window.fullscreen=false
window.maximized=false
window.alwaysOnTop=false

# Stage Configuration
stage.style=DECORATED
stage.modality=NONE
stage.opacity=1.0
stage.icon.path=/icons/app-icon.png

# Scene Configuration
scene.stylesheet=/styles/main.css
scene.stylesheet.theme=/styles/material-light.css
scene.fill.color=#ffffff
scene.background.color=#f5f5f5

# Theme Configuration
theme.name=material
theme.variant=light
theme.primary.color=#2196f3
theme.secondary.color=#ff4081
theme.background.color=#ffffff
theme.surface.color=#ffffff
theme.error.color=#f44336
theme.warning.color=#ff9800
theme.success.color=#4caf50
theme.info.color=#2196f3

# Font Configuration
font.family=Roboto
font.size.normal=14
font.size.small=12
font.size.large=16
font.size.title=18
font.size.header=24
font.weight.normal=400
font.weight.bold=700
font.weight.light=300

# Animation Configuration
animation.duration.short=200
animation.duration.normal=300
animation.duration.long=500
animation.enabled=true
animation.easing=EASE_IN_OUT

# Data Structure Visualization
visualization.grid.size=20
visualization.node.size=30
visualization.edge.width=2
visualization.animation.speed=medium
visualization.color.scheme=default
visualization.show.grid=true
visualization.snap.to.grid=true
visualization.auto.layout=true

# Algorithm Configuration
algorithm.execution.speed=normal
algorithm.step.delay=500
algorithm.highlight.color=#ff9800
algorithm.current.color=#4caf50
algorithm.visited.color=#2196f3
algorithm.completed.color=#9e9e9e

# Performance Monitoring
performance.monitoring.enabled=true
performance.fps.limit=60
performance.memory.limit=512
performance.gc.threshold=0.8
performance.profiling=false

# Logging Configuration
logging.level=INFO
logging.file.path=logs/javafx-app.log
logging.file.max.size=10MB
logging.file.max.count=5
logging.console.enabled=true
logging.pattern=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Debug Configuration
debug.mode=false
debug.show.fps=false
debug.show.memory=false
debug.show.bounds=false
debug.show.css=false
debug.show.events=false

# Internationalization
i18n.default.locale=en_US
i18n.supported.locales=en_US,es_ES,fr_FR,de_DE,it_IT,pt_BR,zh_CN,ja_JP
i18n.resource.bundle.path=/i18n/messages
i18n.fallback.locale=en_US

# Accessibility Configuration
accessibility.enabled=true
accessibility.high.contrast=false
accessibility.large.text=false
accessibility.screen.reader=false
accessibility.keyboard.navigation=true

# Security Configuration
security.sandbox.enabled=false
security.file.access.read=true
security.file.access.write=false
security.network.access=false
security.system.access=false

# Persistence Configuration
persistence.enabled=true
persistence.auto.save=true
persistence.auto.save.interval=300000
persistence.file.path=user.home/.dsa/javafx/app.properties
persistence.format=properties

# Plugin Configuration
plugins.enabled=true
plugins.directory=plugins
plugins.auto.load=true
plugins.hot.reload=false

# Help System
help.enabled=true
help.url=https://dsa-java-project.github.io/docs
help.local.path=/help/index.html
help.tooltips.enabled=true
help.context.sensitive=true

# Updates Configuration
updates.check.enabled=true
updates.check.interval=86400000
updates.url=https://api.github.com/repos/dsa-java-project/DSA-JAVA/releases
updates.auto.download=false
updates.auto.install=false

# Telemetry Configuration
telemetry.enabled=false
telemetry.anonymous=true
telemetry.endpoint=https://telemetry.dsa-java-project.com
telemetry.data.usage=false
telemetry.data.performance=false
telemetry.data.errors=true

# Development Configuration
dev.hot.reload=true
dev.show.developer.menu=false
dev.show.performance.monitor=false
dev.show.css.inspector=false
dev.show.scene.graph=false
dev.show.event.log=false

# Testing Configuration
test.headless=true
test.robot.delay=100
test.robot.timeout=5000
test.screenshot.on.failure=true
test.video.recording=false

# Build Configuration
build.obfuscate=false
build.compress=true
build.native=false
build.install4j=false
build.jpackage.enabled=false

# Platform Specific Configuration
platform.windows.theme=windows
platform.macos.theme=system
platform.linux.theme=gtk

# Memory Configuration
memory.heap.initial=256m
memory.heap.max=1024m
memory.perm.size=128m
memory.direct.size=256m

# Network Configuration
network.timeout=30000
network.retry.count=3
network.retry.delay=1000
network.proxy.enabled=false
network.proxy.host=
network.proxy.port=8080

# File System Configuration
fs.temp.directory=temp
fs.cache.directory=cache
fs.backup.directory=backup
fs.export.directory=exports
fs.import.directory=imports

# User Interface Configuration
ui.ribbon.enabled=true
ui.toolbar.enabled=true
ui.statusbar.enabled=true
ui.sidebar.enabled=true
ui.tabs.enabled=true
ui.context.menu.enabled=true

# Data Configuration
data.auto.save=true
data.auto.save.interval=60000
data.backup.enabled=true
data.backup.interval=300000
data.export.format=json
data.import.supported.formats=json,xml,csv

# Performance Configuration
performance.cache.enabled=true
performance.cache.size=100
performance.cache.ttl=3600000
performance.pool.size=10
performance.pool.max.size=20

# Error Handling Configuration
error.reporting.enabled=true
error.reporting.endpoint=https://errors.dsa-java-project.com
error.include.stack.trace=true
error.include.system.info=true
error.auto.send=false

# Feature Flags
feature.experimental=false
feature.beta.features=true
feature.advanced.mode=false
feature.expert.mode=false
feature.tutorial.mode=true
