# ========================================
# DSA Java Spring Boot Application Properties
# ========================================

# Application Information
spring.application.name=DSA Java Application
spring.application.version=1.0.0
spring.profiles.active=dev

# Server Configuration
server.port=8080
server.servlet.context-path=/api/v1
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,text/javascript,application/javascript
server.error.include-stacktrace=always
server.error.include-message=always
server.error.whitelabel.enabled=true
server.error.path=/error
server.error.whitelabel.enabled=true

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics,env,config,beans,httptrace,loggers,threaddump,caches,scheduledtasks
management.endpoints.web.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:8080
management.endpoints.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
management.endpoints.web.cors.allowed-headers=*
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=dsa-java
management.metrics.tags.jvm=jvm
management.metrics.tags.system=system
management.metrics.tags.logback=logback
management.metrics.tags.http=http

# Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.show-sql=true
spring.jpa.hibernate.properties.hibernate.format_sql=true
spring.jpa.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.jdbc.batch_size=20
spring.jpa.hibernate.order_inserts=true
spring.jpa.hibernate.order_updates=true
spring.jpa.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory
spring.jpa.properties.hibernate.javax.cache.provider=org.ehcache.jsr107.EhcacheCachingProvider
spring.jpa.properties.hibernate.javax.cache.uri=file:config/ehcache/ehcache.xml
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# Flyway Database Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.check-location=false
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.ignore-missing-migrations=false

# Redis Configuration (for caching)
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.key-prefix=dsa-java
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true
spring.cache.redis.host=localhost
spring.cache.redis.port=6379
spring.cache.redis.password=
spring.cache.redis.database=0
spring.cache.redis.timeout=2000ms
spring.cache.redis.jedis.pool.max-active=8
spring.cache.redis.jedis.pool.max-idle=8
spring.cache.redis.jedis.pool.min-idle=0
spring.cache.redis.jedis.pool.max-wait=-1ms

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin
spring.security.roles=ADMIN,USER,ALGORITHM_MANAGER,DATA_STRUCTURE_MANAGER,ANALYST
spring.security.jwt.secret=dsa-java-secret-key-for-jwt-token-generation-should-be-at-least-256-bits
spring.security.jwt.expiration=86400000
spring.security.jwt.refresh-expiration=604800000
spring.security.jwt.header=Authorization
spring.security.jwt.prefix=Bearer
spring.security.jwt.issuer=dsa-java-project
spring.security.jwt.audience=dsa-java-application

# Logging Configuration
logging.level.com.dsa=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.data.jpa=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.type.descriptor.sql.BasicExtractor=TRACE
logging.level.org.hibernate.stat=DEBUG
logging.level.org.hibernate.type=TRACE
logging.level.org.hibernate.cache=DEBUG
logging.level.org.hibernate.resource=DEBUG
logging.level.org.hibernate.engine.jdbc.batch.internal.AbstractBatchImpl=DEBUG
logging.level.org.hibernate.engine.jdbc.connections.ConnectionProviderImpl=DEBUG
logging.level.org.hibernate.engine.transaction.internal.TransactionImpl=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.hbm2ddl.internal.SchemaExportImpl=DEBUG

# Logback Configuration
logging.config=classpath:config/logging/logback-spring.xml
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/dsa-java-spring-boot.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.file.total-size-cap=1GB

# JSON Configuration
spring.jackson.serialization.write-dates-as-timestamps=true
spring.jackson.serialization.write-dates-as-zone-id=true
spring.jackson.serialization.indent-output=true
spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSXXX
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.mapper.default-view-inclusion=NON_NULL
spring.jackson.parser.allow-unquoted-field-names=true
spring.jackson.parser.allow-single-quotes=true

# Actuator Configuration
management.endpoints.web.expose.include=*
management.endpoints.web.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:8080
management.endpoints.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
management.endpoints.web.cors.allowed-headers=*
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=dsa-java
management.metrics.tags.jvm=jvm
management.metrics.tags.system=system
management.metrics.tags.logback=logback
management.metrics.tags.http=http

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.defaultModelsExpandDepth=2
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.display-operation-id=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.groups.enabled=true
springdoc.swagger-ui.csrf.enabled=false
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha

# DevTools Configuration
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.remote-secret=my-secret
spring.devtools.livereload.poll-interval=1000ms

# Task Execution Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=dsa-java-task-
spring.task.execution.shutdown.accept-termination-after-wait=true
spring.task.execution.await-termination-seconds=60

# Async Configuration
spring.task.scheduling.pool.size=5
spring.task.scheduling.thread-name-prefix=dsa-java-scheduling-
spring.mvc.async.request-timeout=30000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=1MB
spring.servlet.multipart.location=temp/uploads

# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.template-resolver.cache=false
spring.thymeleaf.resolver-cache=false

# Email Configuration (if needed)
spring.mail.host=localhost
spring.mail.port=587
spring.mail.username=test@dsa-java.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.debug=true

# Internationalization
spring.messages.basename=messages
spring.messages.cache-duration=3600
spring.messages.encoding=UTF-8
spring.messages.basename=classpath:i18n/messages
spring.messages.cache-seconds=3600
spring.messages.fallback-to-system-locale=true
spring.mvc.locale.resolver=fixed

# ========================================
# Profile-Specific Configurations
# ========================================

# Development Profile
---
spring.config.activate.on-profile=dev
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.com.dsa=DEBUG
logging.level.org.springframework=DEBUG
spring.h2.console.enabled=true
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Test Profile
---
spring.config.activate.on-profile=test
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.hibernate.properties.hibernate.format_sql=false
logging.level.com.dsa=INFO
logging.level.org.springframework=INFO
spring.h2.console.enabled=false
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# Production Profile
---
spring.config.activate.on-profile=prod
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.com.dsa=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
spring.h2.console.enabled=false
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
spring.datasource.url=jdbc:h2:./data/dsa-java-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=dsa_user
spring.datasource.password=secure_password_here

# Integration Test Profile
---
spring.config.activate.on-profile=integration-test
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.com.dsa=DEBUG
logging.level.org.springframework=DEBUG
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# Performance Test Profile
---
spring.config.activate.on-profile=performance-test
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.properties.hibernate.jdbc.fetch_size=100
logging.level.com.dsa=INFO
logging.level.org.springframework=WARN
spring.h2.console.enabled=false

# Migration Profile
---
spring.config.activate.on-profile=migration
spring.flyway.enabled=true
spring.flyway.clean-disabled=false
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
logging.level.org.flyway=DEBUG

# Health Check Profile
---
spring.config.activate.on-profile=health-check
spring.actuator.health.defaults.enabled=true
spring.actuator.health.probes.enabled=true
management.endpoints.web.expose.include=health,info,metrics
management.endpoint.health.show-details=always

