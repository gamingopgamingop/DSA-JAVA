dsa.testing.integration.enabled=true
dsa.testing.performance.enabled=true
dsa.testing.coverage.enabled=true
dsa.testing.coverage.threshold=80
dsa.testing.mock.enabled=true
dsa.testing.testcontainers.enabled=true

# Development Configuration
dsa.development.hot-reload.enabled=true
dsa.development.auto-restart=true
dsa.development.debug.enabled=true
dsa.development.profiling.enabled=false

# Production Configuration
dsa.production.optimization.enabled=true
dsa.production.caching.enabled=true
dsa.production.monitoring.enabled=true
dsa.production.security.hardening.enabled=true
dsa.production.logging.level=WARN
dsa.production.hibernate.show-sql=false

# ========================================
