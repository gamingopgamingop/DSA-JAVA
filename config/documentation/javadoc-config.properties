# Javadoc Configuration for DSA Java Project

# Source configuration
sourcepath=src/main/java:src/test/java
subpackages=com.dsa
exclude=**/internal/**,**/generated/**,**/docs/**

# Output configuration
d=build/docs/javadoc
doctitle=DSA Java Algorithms - API Documentation
windowtitle=DSA Java Algorithms
header=<b>DSA Java Algorithms</b>
footer=<b>DSA Java Algorithms v1.0.0</b>
bottom=<font size="-1">Generated by Javadoc on {0}</font>

# Encoding
charset=UTF-8
docencoding=UTF-8
encoding=UTF-8

# Documentation options
author=true
version=true
since=true
use=true

# Additional options
linksource=true
splitindex=true
nodeprecated=false
nodeprecatedlist=false
notree=false
noindex=false
nonavbar=false
nohelp=false
serialwarn=true

# Tags
tag=complexity:a:"Time Complexity: "
tag=space:a:"Space Complexity: "
tag=performance:a:"Performance: "
tag=stability:a:"Stability: "
tag=example:a:"Example: "
tag=see:a:"See Also: "
tag=todo:a:"TODO: "
tag=note:a:"Note: "
tag=warning:a:"Warning: "

# Custom tags for DSA project
tag=algorithm:a:"Algorithm Type: "
tag=implementation:a:"Implementation: "
tag=optimization:a:"Optimization: "
tag=reference:a:"Reference: "

# Links to external documentation
link=https://docs.oracle.com/en/java/javase/17/docs/api/
link=https://junit.org/junit5/docs/current/api/
link=https://site.mockito.org/javadoc/current/

# Grouping
group=Core Algorithms com.dsa.algorithms*
group=Data Structures com.dsa.datastructures*
group=Sorting Algorithms com.dsa.algorithms.sort*
group=Search Algorithms com.dsa.algorithms.search*
group=Test Framework com.dsa.tests*
group=Utilities com.dsa.util*

# Overview documentation
overview=src/main/java/overview.html

# Stylesheet (optional)
stylesheetfile=config/documentation/javadoc-stylesheet.css

# Additional doclet options
-docletpath=config/documentation/
-doclet=com.dsa.doclet.DSADoclet

# Package documentation
-package

# Exclude certain members
-exclude

# Include private members for comprehensive documentation
-private

# Include protected members
-protected

# Include package-private members
-package

# Include public members (default)
-public

# Show all classes and members
-classpath

# Include inherited members
-inherit

# Include deprecated items
-nodeprecated

# Include synthetic members
-synthetic

# Quiet mode (reduce output)
-quiet

# Verbose mode (more output)
-verbose

# Locale
-locale=en_US

# Time zone
-Duser.timezone=UTC

# Memory settings
-J-Xmx1024m
-J-Xms512m

# Additional JVM options
-J-XX:+UseG1GC
-J-XX:+UseStringDeduplication

# Source compatibility
-source 17

# Target compatibility
-target 17

# Module system options (if using modules)
--module-source-path src/main/java
--add-modules java.base
--add-exports java.base/jdk.internal.ref=ALL-UNNAMED

# Documentation quality checks
-Xdoclint:all,-missing

# HTML5 documentation
-html5

# Timestamp
-Dtimestamp=new java.util.Date()

# Custom CSS for better styling
--add-stylesheet config/documentation/javadoc-stylesheet.css

# Custom JavaScript for interactive features
--add-script config/documentation/javadoc-script.js
