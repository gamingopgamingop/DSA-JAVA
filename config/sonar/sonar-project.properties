# SonarQube Project Configuration for DSA Java Project

# Project identification
sonar.projectKey=dsa-java-algorithms
sonar.projectName=DSA Java Algorithms
sonar.projectVersion=1.0.0
sonar.projectDescription=Data Structures and Algorithms in Java - A comprehensive learning repository

# Source and test directories
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.source=17
sonar.java.target=17

# Binary directories
sonar.java.binaries=build/classes/java/main
sonar.java.test.binaries=build/classes/java/test

# Coverage configuration
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml
sonar.jacoco.reportPaths=build/jacoco/test.exec

# Static analysis configuration
sonar.java.checkstyle.reportPaths=build/reports/checkstyle/main.xml
sonar.java.pmd.reportPaths=build/reports/pmd/main.xml
sonar.java.spotbugs.reportPaths=build/reports/spotbugs/spotbugs.xml

# Exclusions and inclusions
sonar.exclusions=\
    **/generated/**,\
    **/docs/**,\
    **/*Documentation*.java,\
    **/Demo*.java,\
    **/Example*.java,\
    **/Main*.java,\
    **/App*.java,\
    **/TestFramework.java,\
    **/*_Test.java,\
    **/build/**,\
    **/gradle/**,\
    **/.gradle/**,\
    **/target/**,\
    **/out/**

sonar.inclusions=\
    **/*Algorithm*.java,\
    **/*Sort*.java,\
    **/*Search*.java,\
    **/*Queue*.java,\
    **/*Stack*.java,\
    **/*LinkedList*.java,\
    **/*Operations*.java,\
    **/*UsingArray*.java,\
    **/*Matrix*.java

# Test exclusions
sonar.test.exclusions=\
    **/generated/**,\
    **/docs/**,\
    **/*Documentation*.java,\
    **/Demo*.java,\
    **/Example*.java

# Quality gates configuration
sonar.qualitygate.wait=true

# Code quality thresholds
# Coverage
sonar.coverage.exclusions=\
    **/generated/**,\
    **/docs/**,\
    **/*Documentation*.java,\
    **/Demo*.java,\
    **/Example*.java,\
    **/Main*.java,\
    **/App*.java,\
    **/TestFramework.java

# Duplicated lines
sonar.cpd.exclusions=\
    **/generated/**,\
    **/docs/**,\
    **/*_Test.java

# Complexity
sonar.java.squid.sarif.reportPaths=build/reports/sonar/sarif.json

# Custom rules for DSA project
# Algorithm-specific quality gates
sonar.qualitygate=DSA-Algorithms-Quality-Gate

# Size metrics
sonar.size.metric=lines

# Technical debt
sonar.technicalDebt.hoursInDay=8

# Language-specific settings
sonar.java.source=17
sonar.java.target=17

# Additional analysis parameters
sonar.java.binaries=build/classes/java/main,build/classes/java/test
sonar.java.libraries=build/libs/*.jar

# External tool reports
sonar.externalIssuesReportPaths=build/reports/external-issues/

# SCM configuration (if needed)
# sonar.scm.provider=git
# sonar.scm.exclusions.disabled=true

# Authentication (if using self-hosted SonarQube)
# sonar.login=your-token
# sonar.password=your-password

# Server configuration (if using self-hosted SonarQube)
# sonar.host.url=https://your-sonarqube-server.com

# Project settings
sonar.links.homepage=https://github.com/your-username/DSA-JAVA
sonar.links.ci=https://github.com/your-username/DSA-JAVA/actions
sonar.links.issue=https://github.com/your-username/DSA-JAVA/issues
sonar.links.scm=https://github.com/your-username/DSA-JAVA

# Custom metrics for DSA project
sonar.metrics.custom.size=algorithm_count
sonar.metrics.custom.documentation=algorithm_documentation_coverage
sonar.metrics.custom.tests=algorithm_test_coverage

# Analysis mode
sonar.sourceEncoding=UTF-8
sonar.scala.surefireReportsPath=target/surefire-reports

# Multi-module configuration (if project becomes multi-module)
# sonar.modules=core,algorithms,tests,documentation

# Specific settings for different file types
sonar.java.file.suffixes=.java
sonar.javascript.file.suffixes=.js
sonar.typescript.file.suffixes=.ts

# Additional configuration for educational project
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5

# Exclude certain issues for educational purposes
sonar.issue.ignore.multicriteria.e1.ruleKey=squid:S00112
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*Algorithm*.java

sonar.issue.ignore.multicriteria.e2.ruleKey=squid:S00116
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*Test*.java

sonar.issue.ignore.multicriteria.e3.ruleKey=squid:S106
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*Test*.java

sonar.issue.ignore.multicriteria.e4.ruleKey=squid:S1148
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*Test*.java

sonar.issue.ignore.multicriteria.e5.ruleKey=squid:S1105
sonar.issue.ignore.multicriteria.e5.resourceKey=**/*Algorithm*.java

# Performance and optimization settings
sonar.scm.revision=latest
sonar.buildString=Gradle 8.5

# Reporting configuration
sonar.issuesReport.html.enable=true
sonar.issuesReport.txt.enable=true

# Dashboard configuration
sonar.duplications.internal=true
sonar.duplications.crossProject=false

# Custom dashboard widgets for DSA project
sonar.dashboard.widget.algorithm_coverage=Algorithm Coverage
sonar.dashboard.widget.algorithm_complexity=Algorithm Complexity
sonar.dashboard.widget.test_documentation=Test Documentation Coverage
