# Java Util Logging Configuration for DSA Java Project

# Global logging level
.level=INFO

# Console handler configuration
handlers=java.util.logging.ConsoleHandler, java.util.logging.FileHandler

# Console Handler
java.util.logging.ConsoleHandler.level=INFO
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.ConsoleHandler.encoding=UTF-8

# File Handler
java.util.logging.FileHandler.level=INFO
java.util.logging.FileHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.FileHandler.encoding=UTF-8
java.util.logging.FileHandler.pattern=logs/dsa-java.%u.%g.log
java.util.logging.FileHandler.limit=10485760
java.util.logging.FileHandler.count=5
java.util.logging.FileHandler.append=true

# Error File Handler
java.util.logging.ErrorHandler.level=ERROR
java.util.logging.ErrorHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.ErrorHandler.encoding=UTF-8
java.util.logging.ErrorHandler.pattern=logs/dsa-java-error.%u.%g.log
java.util.logging.ErrorHandler.limit=10485760
java.util.logging.ErrorHandler.count=5
java.util.logging.ErrorHandler.append=true

# Algorithm-specific loggers
com.dsa.algorithms.level=DEBUG
com.dsa.algorithms.sort.level=DEBUG
com.dsa.algorithms.search.level=DEBUG
com.dsa.algorithms.datastructures.level=DEBUG

# Test loggers
com.dsa.tests.level=DEBUG
org.junit.level=WARN
org.mockito.level=WARN

# Performance loggers
com.dsa.performance.level=INFO

# Framework loggers
org.springframework.level=WARN
org.hibernate.level=WARN
org.apache.level=WARN
com.fasterxml.jackson.level=WARN

# Simple formatter configuration
java.util.logging.SimpleFormatter.format=%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS %4$s %2$s: %5$s%6$s%n

# Environment-specific configurations

# Development
com.dsa.dev.level=DEBUG
com.dsa.algorithms.dev.level=TRACE
com.dsa.tests.dev.level=DEBUG

# Production
com.dsa.prod.level=INFO
com.dsa.algorithms.prod.level=INFO
com.dsa.tests.prod.level=WARN

# Test
com.dsa.test.level=DEBUG
com.dsa.algorithms.test.level=DEBUG
com.dsa.tests.test.level=DEBUG
org.junit.test.level=INFO
org.mockito.test.level=INFO

# CI Environment
com.dsa.ci.level=INFO
com.dsa.algorithms.ci.level=INFO
com.dsa.tests.ci.level=INFO

# Custom log levels for specific classes
com.dsa.TestFramework.level=DEBUG
com.dsa.BinarySearch.level=DEBUG
com.dsa.QuickSort.level=DEBUG
com.dsa.BubbleSort.level=DEBUG
com.dsa.LinearQueue.level=DEBUG
com.dsa.StackOperations.level=DEBUG
com.dsa.LinkedListOperations.level=DEBUG

# Performance monitoring
com.dsa.performance.benchmark.level=INFO
com.dsa.performance.memory.level=INFO
com.dsa.performance.time.level=INFO

# Error handling
com.dsa.error.level=ERROR
com.dsa.exception.level=WARN

# Documentation generation
com.dsa.documentation.level=INFO
com.dsa.docs.generator.level=DEBUG

# Build process
com.dsa.build.level=INFO
com.dsa.gradle.level=WARN
