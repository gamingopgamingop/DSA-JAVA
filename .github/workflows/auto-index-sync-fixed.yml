name: Auto Index Synchronization (Fixed)

on:
  push:
    branches: [ main, develop ]
    paths:
      - '*.java'
      - '!*_Test.java'
      - '!*_Documentation.md'
      - 'scripts/generate-index.sh'
  pull_request:
    branches: [ main ]
    paths:
      - '*.java'
      - '!*_Test.java'
      - '!*_Documentation.md'
      - 'scripts/generate-index.sh'
  workflow_dispatch:  # Allow manual trigger

# Enhanced permissions for the workflow
permissions:
  contents: write          # Write to repository
  pull-requests: write    # Comment on PRs
  issues: write          # Create and edit issues
  actions: read           # Read workflow runs
  checks: write          # Update check statuses

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Xmx2g -Dfile.encoding=UTF-8'

jobs:
  # Check if index needs updating
  check-index:
    runs-on: ubuntu-latest
    name: 🔍 Check Index Status
    outputs:
      needs-update: ${{ steps.check.outputs.needs-update }}
      has-changes: ${{ steps.check.outputs.has-changes }}
      total-algorithms: ${{ steps.check.outputs.total-algorithms }}
      current-entries: ${{ steps.check.outputs.current-entries }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Get full history for proper diff
        
    - name: Make script executable
      run: chmod +x scripts/generate-index.sh
      
    - name: Check if index is up to date
      id: check
      run: |
        echo "🔍 Checking if docs/INDEX.md is up to date..."
        
        # Count actual algorithm files
        total_algorithms=$(find . -maxdepth 1 -name "*.java" ! -name "*_Test.java" | wc -l)
        echo "total-algorithms=$total_algorithms" >> $GITHUB_OUTPUT
        
        # Count current index entries
        if [[ -f "docs/INDEX.md" ]]; then
          current_entries=$(grep -c "^\- \*\*\[" docs/INDEX.md 2>/dev/null || echo "0")
        else
          current_entries=0
        fi
        echo "current-entries=$current_entries" >> $GITHUB_OUTPUT
        
        # Check if index exists and is up to date
        if [[ -f "docs/INDEX.md" ]] && ./scripts/generate-index.sh --check >/dev/null 2>&1; then
          echo "needs-update=false" >> $GITHUB_OUTPUT
          echo "has-changes=false" >> $GITHUB_OUTPUT
          echo "✅ Index is up to date"
        else
          echo "needs-update=true" >> $GITHUB_OUTPUT
          echo "has-changes=true" >> $GITHUB_OUTPUT
          echo "📝 Index needs updating"
        fi
        
        echo "📊 Current statistics:"
        echo "- Algorithm files found: $total_algorithms"
        echo "- Current index entries: $current_entries"

  # Update index (only if needed)
  update-index:
    runs-on: ubuntu-latest
    name: 📝 Update Index
    needs: check-index
    if: needs.check-index.outputs.needs-update == 'true'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        
    - name: Setup Git user
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
    - name: Make script executable
      run: chmod +x scripts/generate-index.sh
      
    - name: Generate new index
      run: |
        echo "📝 Generating new algorithm index..."
        ./scripts/generate-index.sh
        
        echo "📊 Generated index preview:"
        echo "Total algorithms found:"
        find . -maxdepth 1 -name "*.java" ! -name "*_Test.java" | wc -l
        
        echo "Index entries:"
        grep -c "^\- \*\*\[" docs/INDEX.md || echo "0"
        
    - name: Show changes
      run: |
        echo "📋 Changes to be committed:"
        if git status --porcelain | grep -q "docs/INDEX.md"; then
          git diff --no-index /dev/null docs/INDEX.md 2>/dev/null || git diff docs/INDEX.md
        else
          echo "No changes detected in INDEX.md"
        fi
        
    - name: Commit and push changes
      run: |
        echo "🚀 Committing updated index..."
        
        # Check if there are actually changes to commit
        if git status --porcelain | grep -q "docs/INDEX.md"; then
          # Add the updated index
          git add docs/INDEX.md
          
          # Commit with descriptive message
          git commit -m "🤖 Auto-update algorithm index
          
          - Updated algorithm count: $(find . -maxdepth 1 -name "*.java" ! -name "*_Test.java" | wc -l)
          - Generated by: scripts/generate-index.sh
          - Timestamp: $(date '+%Y-%m-%d %H:%M:%S')
          
          [skip ci]"
          
          # Push changes
          git push
          
          echo "✅ Index updated and pushed successfully"
        else
          echo "ℹ️ No changes to commit - index was already up to date"
        fi

  # Create PR comment (for pull requests)
  pr-comment:
    runs-on: ubuntu-latest
    name: 💬 PR Comment
    needs: check-index
    if: github.event_name == 'pull_request' && needs.check-index.outputs.needs-update == 'true'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Make script executable
      run: chmod +x scripts/generate-index.sh
      
    - name: Generate preview
      id: preview
      run: |
        echo "📝 Generating index preview for PR comment..."
        
        # Generate temporary index for preview
        ./scripts/generate-index.sh --dry-run > temp_index.md
        
        # Extract key statistics
        total_algorithms=${{ needs.check-index.outputs.total-algorithms }}
        current_entries=${{ needs.check-index.outputs.current-entries }}
        
        echo "total-algorithms=$total_algorithms" >> $GITHUB_OUTPUT
        echo "current-entries=$current_entries" >> $GITHUB_OUTPUT
        
        # Create summary
        cat > pr_comment.md << 'EOF'
        ## 🤖 Algorithm Index Update Required
        
        The algorithm index (`docs/INDEX.md`) needs to be updated to reflect the current state of the repository.
        
        ### 📊 Statistics
        EOF
        
        echo "- **Total Algorithms**: $total_algorithms" >> pr_comment.md
        echo "- **Index Entries**: $current_entries" >> pr_comment.md
        
        if [[ "$total_algorithms" -ne "$current_entries" ]]; then
          echo "- **Status**: ⚠️ Out of sync" >> pr_comment.md
        else
          echo "- **Status**: ✅ In sync" >> pr_comment.md
        fi
        
        cat >> pr_comment.md << 'EOF'
        
        ### 🔧 Actions Required
        1. Merge this PR
        2. The index will be automatically updated after merge
        3. Or manually run: `./scripts/generate-index.sh`
        
        ### 📋 Algorithm Categories
        EOF
        
        # Extract categories from generated index
        grep "^### .*" temp_index.md | sed 's/^### /- **/' >> pr_comment.md
        
        echo "" >> pr_comment.md
        echo "---" >> pr_comment.md
        echo "*This comment was generated automatically*" >> pr_comment.md
        
        # Store comment content
        comment_body=$(cat pr_comment.md)
        echo "comment-body<<EOF" >> $GITHUB_OUTPUT
        echo "$comment_body" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        # Cleanup
        rm -f temp_index.md pr_comment.md
        
    - name: Create PR comment
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const commentBody = `${{ steps.preview.outputs.comment-body }}`;
          
          try {
            // Find existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Algorithm Index Update Required')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody,
              });
              console.log('Updated existing PR comment');
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
              console.log('Created new PR comment');
            }
          } catch (error) {
            console.error('Failed to create/update PR comment:', error.message);
            // Don't fail the workflow, just log the error
          }

  # Create issue (for main branch pushes) - with better error handling
  create-issue:
    runs-on: ubuntu-latest
    name: 🐛 Create Issue
    needs: check-index
    if: github.event_name == 'push' && needs.check-index.outputs.needs-update == 'true' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Make script executable
      run: chmod +x scripts/generate-index.sh
      
    - name: Generate issue details
      id: issue
      run: |
        echo "🐛 Creating issue for index update..."
        
        # Generate statistics
        total_algorithms=${{ needs.check-index.outputs.total-algorithms }}
        current_entries=${{ needs.check-index.outputs.current-entries }}
        
        echo "total-algorithms=$total_algorithms" >> $GITHUB_OUTPUT
        echo "current-entries=$current_entries" >> $GITHUB_OUTPUT
        
        # Create issue title and body
        if [[ "$total_algorithms" -ne "$current_entries" ]]; then
          echo "issue-title=Algorithm Index Out of Sync" >> $GITHUB_OUTPUT
          echo "issue-labels=documentation,maintenance,automated" >> $GITHUB_OUTPUT
        else
          echo "issue-title=Algorithm Index Needs Update" >> $GITHUB_OUTPUT
          echo "issue-labels=documentation,maintenance" >> $GITHUB_OUTPUT
        fi
        
    - name: Create GitHub issue with enhanced error handling
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const totalAlgorithms = ${{ steps.issue.outputs.total-algorithms }};
          const currentEntries = ${{ steps.issue.outputs.current-entries }};
          const issueTitle = `${{ steps.issue.outputs.issue-title }}`;
          const issueLabels = `${{ steps.issue.outputs.issue-labels }}`.split(',');
          
          const issueBody = `## 🤖 Algorithm Index Update Required

          The algorithm index (\`docs/INDEX.md\) is out of sync with the actual algorithm files in the repository.

          ### 📊 Current Status
          - **Total Algorithm Files**: ${totalAlgorithms}
          - **Current Index Entries**: ${currentEntries}
          - **Status**: ${totalAlgorithms !== currentEntries ? '⚠️ Out of sync' : '📝 Needs refresh'}

          ### 🔧 Resolution Options

          **Option 1: Automatic (Recommended)**
          - The index will be automatically updated by the \`update-index\` job
          - No manual action required

          **Option 2: Manual**
          \`\`\`bash
          # Run the index generation script
          ./scripts/generate-index.sh
          
          # Commit the changes
          git add docs/INDEX.md
          git commit -m "Update algorithm index"
          git push
          \`\`\`

          ### 📋 Algorithm Categories Detected
          The index will categorize algorithms into:
          - 🔍 Search Algorithms
          - 📊 Sorting Algorithms  
          - 🔗 Data Structures
          - 🔢 Array Operations
          - 📈 Statistical Analysis
          - 🛠️ Utility Classes

          ### 🚀 Prevention
          To prevent this issue in the future:
          - The auto-index workflow runs on every push to main/develop
          - Index is automatically kept in sync
          - PR comments provide status updates

          ---
          
          *This issue was created automatically by the auto-index synchronization workflow*  
          *Timestamp: ${new Date().toISOString()}*`;

          try {
            // First, check if a similar issue already exists
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'documentation,maintenance',
              state: 'open'
            });
            
            const similarIssue = existingIssues.data.find(issue => 
              issue.title.includes('Algorithm Index') && 
              issue.title.includes('Update Required')
            );
            
            if (similarIssue) {
              console.log('Similar issue already exists:', similarIssue.html_url);
              // Update existing issue instead of creating a new one
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: similarIssue.number,
                body: '🔄 **Index status updated**: The workflow detected the index still needs updating. This comment was generated on ' + new Date().toISOString()
              });
              console.log('Updated existing issue with new comment');
            } else {
              // Create new issue
              const result = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: issueLabels,
              });
              console.log('Issue created successfully:', result.data.html_url);
            }
          } catch (error) {
            console.error('Failed to create/update issue:', error.message);
            console.error('Error details:', error);
            
            // Try alternative approach - create a simple comment
            try {
              console.log('Attempting alternative approach...');
              
              // Check if we can at least create a file with the issue information
              const fs = require('fs');
              const issueInfo = {
                title: issueTitle,
                body: issueBody,
                labels: issueLabels,
                timestamp: new Date().toISOString(),
                error: error.message
              };
              
              fs.writeFileSync('issue_info.json', JSON.stringify(issueInfo, null, 2));
              console.log('Issue information saved to issue_info.json');
              
            } catch (fsError) {
              console.error('Failed to save issue info:', fsError.message);
            }
            
            // Don't fail the workflow, just log the error
            console.log('Workflow will continue despite issue creation failure');
          }

  # Alternative issue creation using file-based approach
  create-issue-fallback:
    runs-on: ubuntu-latest
    name: 📝 Create Issue File
    needs: [check-index, create-issue]
    if: always() && needs.create-issue.result == 'failure' && needs.check-index.outputs.needs-update == 'true'
    
    steps:
    - name: Create issue file as fallback
      run: |
        echo "📝 Creating issue file as fallback..."
        
        cat > ISSUE_UPDATE_REQUIRED.md << 'EOF'
        # Algorithm Index Update Required
        
        ## 📊 Current Status
        - **Total Algorithm Files**: ${{ needs.check-index.outputs.total-algorithms }}
        - **Current Index Entries**: ${{ needs.check-index.outputs.current-entries }}
        - **Status**: Out of sync
        
        ## 🔧 Resolution
        Run the following command to update the index:
        ```bash
        ./scripts/generate-index.sh
        ```
        
        ## 📋 Details
        This file was created because the GitHub Actions workflow could not create an issue due to permission restrictions.
        
        ---
        *Created by auto-index workflow on $(date '+%Y-%m-%d %H:%M:%S')*
        EOF
        
        echo "✅ Issue file created: ISSUE_UPDATE_REQUIRED.md"

  # Summary job
  summary:
    runs-on: ubuntu-latest
    name: 📊 Sync Summary
    needs: [check-index, update-index, pr-comment, create-issue, create-issue-fallback]
    if: always()
    
    steps:
    - name: Sync Summary
      run: |
        echo "📊 Auto Index Synchronization Summary"
        echo "======================================"
        echo ""
        echo "🔍 Index Check: ${{ needs.check-index.result }}"
        echo "📝 Index Update: ${{ needs.update-index.result }}"
        echo "💬 PR Comment: ${{ needs.pr-comment.result }}"
        echo "🐛 Issue Creation: ${{ needs.create-issue.result }}"
        echo "📝 Fallback Issue File: ${{ needs.create-issue-fallback.result }}"
        echo ""
        
        if [[ "${{ needs.check-index.outputs.needs-update }}" == "true" ]]; then
          echo "📝 **Index needed updating**"
          echo "   - Total algorithms: ${{ needs.check-index.outputs.total-algorithms }}"
          echo "   - Current entries: ${{ needs.check-index.outputs.current-entries }}"
          echo "   - Changes detected: Yes"
          
          if [[ "${{ needs.update-index.result }}" == "success" ]]; then
            echo "   - ✅ Index updated successfully"
          else
            echo "   - ❌ Index update failed"
          fi
          
          if [[ "${{ needs.create-issue.result }}" == "failure" ]]; then
            echo "   - ⚠️ Issue creation failed (permission issue)"
            echo "   - 📝 Fallback issue file created"
          else
            echo "   - ✅ Issue created successfully"
          fi
        else
          echo "✅ **Index was up to date**"
          echo "   - No changes required"
          echo "   - Total algorithms: ${{ needs.check-index.outputs.total-algorithms }}"
        fi
        
        echo ""
        echo "🔧 **Next Steps**"
        if [[ "${{ needs.check-index.outputs.needs-update }}" == "true" ]]; then
          echo "- Check the updated docs/INDEX.md"
          echo "- Verify all algorithms are listed correctly"
          if [[ "${{ needs.create-issue.result }}" == "failure" ]]; then
            echo "- Check ISSUE_UPDATE_REQUIRED.md for manual instructions"
          fi
        else
          echo "- Continue with development"
          echo "- Index will be checked again on next push"
        fi
