name: Documentation Quality Checks (Self-Healing)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docs/**'
      - '**.md'
      - '.github/workflows/docs-check-self-healing.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'docs/**'
      - '**.md'
      - '.github/workflows/docs-check-self-healing.yml'

# Add proper permissions for the workflow
permissions:
  contents: read          # Read repository contents
  issues: write          # Create and edit issues
  pull-requests: write   # Comment on PRs
  checks: write          # Update check statuses
  actions: read         # Read workflow runs

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Xmx2g -Dfile.encoding=UTF-8'

jobs:
  # Self-Healing Setup Job
  setup-docs:
    runs-on: ubuntu-latest
    name: 🚀 Self-Healing Documentation Setup
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Make setup script executable
      run: chmod +x scripts/setup-docs.sh
      
    - name: Run self-healing documentation setup
      run: |
        echo "🚀 Running self-healing documentation setup..."
        ./scripts/setup-docs.sh
        echo "✅ Documentation setup completed!"
        
    - name: Check for changes
      id: changes
      run: |
        if [[ -n $(git status --porcelain) ]]; then
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "📝 Documentation structure was updated"
        else
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "✅ Documentation structure is already complete"
        fi
        
    - name: Commit and push changes (if any)
      if: steps.changes.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docs/
        git commit -m "🚀 Auto-update documentation structure [skip ci]"
        git push
        
    - name: Upload documentation structure
      uses: actions/upload-artifact@v4
      with:
        name: documentation-structure
        path: docs/
        retention-days: 7

  # Markdown Linting
  markdown-lint:
    runs-on: ubuntu-latest
    name: Markdown Linting
    needs: setup-docs
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install markdownlint
      run: |
        npm install -g markdownlint-cli
        npm install -g markdownlint-rule-titlecase
        
    - name: Create markdownlint config
      run: |
        cat > .markdownlint.json << 'EOF'
        {
          "default": true,
          "MD013": {
            "line_length": 120,
            "heading_line_length": 80,
            "code_block_line_length": 120,
            "code_blocks": true,
            "tables": true,
            "headings": true,
            "strict": false,
            "stern": false
          },
          "MD033": {
            "allowed_elements": ["img", "a", "br", "details", "summary"],
            "allowed_attributes": ["href", "src", "alt", "title", "id", "class"]
          },
          "MD041": false,
          "MD046": {
            "style": "fenced"
          },
          "MD007": {
            "indent": 4
          },
          "MD029": {
            "style": "ordered"
          },
          "MD048": {
            "style": "backtick"
          },
          "MD034": false,
          "MD036": {
            "punctuation": ".,;:!。，；：！"
          },
          "MD040": {
            "fence": "```",
            "language_only": false
          },
          "MD044": {
            "names": [
              "See also",
              "See also:",
              "See also:",
              "Implementation",
              "Usage",
              "Examples",
              "Parameters",
              "Returns",
              "Throws",
              "Since",
              "Deprecated",
              "Todo",
              "Example"
            ]
          }
        }
        EOF
        
    - name: Run markdownlint
      run: |
        echo "🔍 Running markdownlint on all markdown files..."
        markdownlint "**/*.md" --config .markdownlint.json || {
          echo "❌ Markdown linting failed. Please fix the above issues."
          echo "📖 For markdownlint rules, see: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md"
          exit 1
        }
        echo "✅ Markdown linting passed!"

  # Link Checking
  link-check:
    runs-on: ubuntu-latest
    name: Link Checking
    needs: setup-docs
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Check for broken links
      uses: lycheeverse/lychee-action@v1.8.0
      with:
        args: --verbose --no-progress --exclude-mail --exclude 'http://localhost' --exclude 'https://localhost'
        fail: true
      env:
        GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        
    - name: Check internal links
      run: |
        echo "🔍 Checking internal documentation links..."
        
        # Create a script to check internal links
        cat > check-links.sh << 'EOF'
        #!/bin/bash
        
        broken_links=0
        total_links=0
        
        # Find all markdown files
        find docs -name "*.md" | while read file; do
          echo "Checking links in $file"
          
          # Extract markdown links
          grep -oE '\[.*\]\([^)]*\)' "$file" | while read link; do
            # Extract the URL part
            url=$(echo "$link" | sed 's/.*(\([^)]*\)).*/\1/')
            
            # Skip external links
            if echo "$url" | grep -qE "^https?://"; then
              continue
            fi
            
            # Check if it's a relative link
            if echo "$url" | grep -q "^docs/"; then
              total_links=$((total_links + 1))
              
              # Convert relative path to absolute
              if [ -f "$url" ] || [ -d "$url" ]; then
                echo "  ✅ $url"
              else
                echo "  ❌ $url (broken)"
                broken_links=$((broken_links + 1))
              fi
            fi
          done
        done
        
        echo "📊 Link check summary:"
        echo "- Total links checked: $total_links"
        echo "- Broken links: $broken_links"
        
        if [ $broken_links -gt 0 ]; then
          echo "❌ Found $broken_links broken links. Please fix them."
          exit 1
        else
          echo "✅ All internal links are valid!"
        fi
        EOF
        
        chmod +x check-links.sh
        ./check-links.sh

  # Structure Validation (now should always pass)
  structure-check:
    runs-on: ubuntu-latest
    name: Documentation Structure Check
    needs: setup-docs
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Validate documentation structure
      run: |
        echo "🏗️ Validating documentation structure (should always pass after setup)..."
        
        # Required directories
        required_dirs=(
          "docs/algorithms"
          "docs/testing"
          "docs/examples"
          "docs/architecture"
          "docs/templates"
          "docs/assets"
        )
        
        # Required files
        required_files=(
          "docs/README.md"
          "docs/INDEX.md"
          "docs/COMPLEXITY_TABLE.md"
          "docs/TEST_CASE_MATRIX.md"
          "docs/GLOSSARY.md"
          "docs/FAQ.md"
          "docs/LEARNING_PATH.md"
          "docs/STYLE_GUIDE.md"
          "docs/ERROR_HANDLING_GUIDE.md"
          "docs/NAMING_CONVENTIONS.md"
          "docs/templates/algorithm-template.md"
          "docs/templates/test-template.md"
          "docs/examples/README.md"
          "docs/architecture/README.md"
          "docs/templates/README.md"
        )
        
        # Check directories
        echo "📁 Checking required directories..."
        missing_dirs=0
        for dir in "${required_dirs[@]}"; do
          if [ -d "$dir" ]; then
            echo "  ✅ $dir"
          else
            echo "  ❌ $dir (missing - this should not happen after setup!)"
            missing_dirs=$((missing_dirs + 1))
          fi
        done
        
        # Check files
        echo "📄 Checking required files..."
        missing_files=0
        for file in "${required_files[@]}"; do
          if [ -f "$file" ]; then
            echo "  ✅ $file"
          else
            echo "  ❌ $file (missing - this should not happen after setup!)"
            missing_files=$((missing_files + 1))
          fi
        done
        
        echo "📊 Structure validation summary:"
        echo "- Missing directories: $missing_dirs"
        echo "- Missing files: $missing_files"
        
        if [ $missing_dirs -gt 0 ] || [ $missing_files -gt 0 ]; then
          echo "❌ Structure validation failed - setup script may have issues!"
          exit 1
        else
          echo "✅ Documentation structure is valid!"
        fi

  # Content Quality Check
  content-quality:
    runs-on: ubuntu-latest
    name: Content Quality Check
    needs: setup-docs
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Check content quality
      run: |
        echo "📝 Checking content quality..."
        
        # Check for minimum content requirements
        echo "📋 Checking minimum content requirements..."
        issues=0
        
        for md_file in docs/**/*.md; do
          if [ -f "$md_file" ]; then
            filename=$(basename "$md_file")
            
            # Check if file has a title
            if ! head -n 1 "$md_file" | grep -q "^# "; then
              echo "  ⚠️  $filename missing title header"
              issues=$((issues + 1))
            fi
            
            # Check minimum length (should have substantial content)
            line_count=$(wc -l < "$md_file")
            if [ "$line_count" -lt 20 ]; then
              echo "  ⚠️  $filename seems too short ($line_count lines)"
              issues=$((issues + 1))
            fi
            
            # Check for TODO/FIXME comments
            todo_count=$(grep -c "TODO\|FIXME\|XXX" "$md_file" 2>/dev/null || echo "0")
            if [ "$todo_count" -gt 0 ]; then
              echo "  ⚠️  $filename has $todo_count TODO/FIXME comments"
            fi
          fi
        done
        
        # Check for broken image references
        echo "🖼️ Checking image references..."
        for md_file in docs/**/*.md; do
          if [ -f "$md_file" ]; then
            # Extract image references
            grep -oE '!\[.*\]\([^)]*\)' "$md_file" | while read img; do
              img_path=$(echo "$img" | sed 's/.*(\([^)]*\)).*/\1/')
              
              # Skip external images
              if echo "$img_path" | grep -qE "^https?://"; then
                continue
              fi
              
              # Check if image exists
              if [ ! -f "$img_path" ]; then
                echo "  ❌ Broken image reference: $img_path in $md_file"
                issues=$((issues + 1))
              fi
            done
          fi
        done
        
        echo "📊 Quality check summary:"
        echo "- Issues found: $issues"
        
        if [ $issues -gt 10 ]; then
          echo "❌ Too many quality issues found. Please review and fix."
          exit 1
        else
          echo "✅ Content quality is acceptable!"
        fi

  # Documentation Generation
  docs-generation:
    runs-on: ubuntu-latest
    name: Documentation Generation
    needs: setup-docs
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Validate Gradle Wrapper
      uses: gradle/wrapper-validation-action@v2
      
    - name: Generate documentation index
      run: |
        echo "📚 Generating documentation index..."
        ./gradlew generateDocsIndex
        echo "✅ Documentation index generated!"
        
    - name: Check index updates
      id: check-index
      run: |
        echo "🔄 Checking if INDEX.md needs update..."
        
        # Count current algorithms
        current_count=$(grep -c "\|.*\.java.*|" docs/INDEX.md || echo "0")
        actual_count=$(find . -maxdepth 1 -name "*_Test.java" | wc -l)
        
        echo "current-count=$current_count" >> $GITHUB_OUTPUT
        echo "actual-count=$actual_count" >> $GITHUB_OUTPUT
        
        if [ "$current_count" -ne "$actual_count" ]; then
          echo "needs-update=true" >> $GITHUB_OUTPUT
          echo "📝 INDEX.md needs update ($current_count vs $actual_count)"
        else
          echo "needs-update=false" >> $GITHUB_OUTPUT
          echo "✅ INDEX.md is up to date"
        fi
        
    - name: Create issue for index update (if needed)
      if: steps.check-index.outputs.needs-update == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          try {
            const result = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'INDEX.md needs update',
              body: 'The INDEX.md file is out of sync with the actual algorithm files. Please run the index generation script to update it.\n\n**Current count**: ' + ${{ steps.check-index.outputs.current-count }} + '\n**Actual count**: ' + ${{ steps.check-index.outputs.actual-count }} + '\n\n**Action required**: Run `./gradlew generateDocsIndex` to update the index.',
              labels: ['documentation', 'maintenance', 'automated']
            });
            console.log('Issue created successfully:', result.data.html_url);
          } catch (error) {
            console.error('Failed to create issue:', error.message);
            // Don't fail the workflow, just log the error
          }
          
    - name: Upload generated documentation
      uses: actions/upload-artifact@v4
      with:
        name: generated-documentation
        path: docs/
        retention-days: 30

  # Summary job
  quality-summary:
    runs-on: ubuntu-latest
    name: 📊 Documentation Quality Summary
    needs: [markdown-lint, link-check, structure-check, content-quality, docs-generation]
    if: always()
    
    steps:
    - name: Quality Check Summary
      run: |
        echo "📊 Documentation Quality Check Summary"
        echo "======================================"
        echo ""
        echo "✅ Markdown Linting: ${{ needs.markdown-lint.result }}"
        echo "✅ Link Checking: ${{ needs.link-check.result }}"
        echo "✅ Structure Check: ${{ needs.structure-check.result }}"
        echo "✅ Content Quality: ${{ needs.content-quality.result }}"
        echo "✅ Documentation Generation: ${{ needs.docs-generation.result }}"
        echo ""
        
        if [[ "${{ needs.markdown-lint.result }}" == "failure" || \
              "${{ needs.link-check.result }}" == "failure" || \
              "${{ needs.structure-check.result }}" == "failure" || \
              "${{ needs.content-quality.result }}" == "failure" || \
              "${{ needs.docs-generation.result }}" == "failure" ]]; then
          echo "❌ Some quality checks failed. Please review the issues above."
          exit 1
        else
          echo "🎉 All documentation quality checks passed!"
          echo "🚀 Self-healing documentation system is working perfectly!"
        fi
        
    - name: Success Notification
      if: needs.markdown-lint.result == 'success' && needs.link-check.result == 'success' && needs.structure-check.result == 'success' && needs.content-quality.result == 'success' && needs.docs-generation.result == 'success'
      run: |
        echo "🎉 SUCCESS: Self-healing documentation system is working perfectly!"
        echo "📚 All documentation structure is automatically maintained"
        echo "🔍 All quality checks passed"
        echo "📝 Documentation is ready for use"
