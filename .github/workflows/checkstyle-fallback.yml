name: Checkstyle with Fallback

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  checkstyle:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5
    
    - name: Check if checkstyle config exists
      id: check_config
      run: |
        if [ -f "config/checkstyle/checkstyle.xml" ]; then
          echo "config_exists=true" >> $GITHUB_OUTPUT
          echo "✅ Checkstyle configuration found"
        else
          echo "config_exists=false" >> $GITHUB_OUTPUT
          echo "❌ Checkstyle configuration missing"
        fi
    
    - name: Run Checkstyle with fallback
      run: |
        echo "🔍 Running Checkstyle analysis..."
        
        # Set CI environment variable for build.gradle detection
        export CI=true
        
        if [ "${{ steps.check_config.outputs.config_exists }}" == "true" ]; then
          echo "📋 Using existing checkstyle configuration"
          ./gradlew checkstyleMain --continue || {
            echo "⚠️ Checkstyle failed but continuing due to CI fallback"
            echo "📊 Checkstyle violations will be reported but won't break the build"
          }
        else
          echo "🔧 Creating minimal checkstyle configuration..."
          mkdir -p config/checkstyle
          cat > config/checkstyle/checkstyle.xml << 'EOF'
<?xml version="1.0"?>
<!DOCTYPE module PUBLIC
    "-//Checkstyle//DTD Checkstyle Configuration 1.3//EN"
    "https://checkstyle.org/dtds/configuration_1_3.dtd">
<module name="Checker">
    <property name="charset" value="UTF-8"/>
    <property name="severity" value="warning"/>
    <property name="fileExtensions" value="java"/>
    <module name="TreeWalker">
        <module name="OuterTypeFilename"/>
        <module name="IllegalTokenText"/>
        <module name="AvoidEscapedUnicodeCharacters"/>
        <module name="LineLength">
            <property name="max" value="120"/>
        </module>
        <module name="AvoidStarImport"/>
        <module name="OneTopLevelClass"/>
        <module name="NoLineWrap"/>
        <module name="EmptyBlock"/>
        <module name="NeedBraces"/>
        <module name="LeftCurly"/>
        <module name="RightCurly"/>
        <module name="WhitespaceAround"/>
        <module name="OneStatementPerLine"/>
        <module name="MultipleVariableDeclarations"/>
        <module name="ArrayTypeStyle"/>
        <module name="MissingSwitchDefault"/>
        <module name="FallThrough"/>
        <module name="UpperEll"/>
        <module name="ModifierOrder"/>
        <module name="EmptyLineSeparator"/>
        <module name="SeparatorWrap"/>
        <module name="PackageName"/>
        <module name="TypeName"/>
        <module name="MemberName"/>
        <module name="ParameterName"/>
        <module name="LocalVariableName"/>
        <module name="ClassTypeParameterName"/>
        <module name="MethodTypeParameterName"/>
        <module name="InterfaceTypeParameterName"/>
        <module name="NoFinalizer"/>
        <module name="GenericWhitespace"/>
        <module name="Indentation"/>
        <module name="AbbreviationAsWordInName"/>
        <module name="OverloadMethodsDeclarationOrder"/>
        <module name="VariableDeclarationUsageDistance"/>
        <module name="CustomImportOrder"/>
        <module name="MethodParamPad"/>
        <module name="ParenPad"/>
        <module name="OperatorWrap"/>
        <module name="AnnotationLocation"/>
        <module name="NonEmptyAtclauseDescription"/>
        <module name="JavadocMethod"/>
        <module name="JavadocType"/>
        <module name="JavadocVariable"/>
        <module name="JavadocStyle"/>
    </module>
</module>
EOF
          echo "📋 Created minimal checkstyle configuration"
          ./gradlew checkstyleMain --continue || {
            echo "⚠️ Checkstyle failed but continuing due to CI fallback"
          }
        fi
    
    - name: Upload Checkstyle results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: checkstyle-reports
        path: build/reports/checkstyle/
        retention-days: 7
    
    - name: Generate Checkstyle summary
      if: always()
      run: |
        echo "## Checkstyle Analysis Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Configuration Status" >> $GITHUB_STEP_SUMMARY
        if [ "${{ steps.check_config.outputs.config_exists }}" == "true" ]; then
          echo "- ✅ Configuration file exists" >> $GITHUB_STEP_SUMMARY
        else
          echo "- 🔧 Fallback configuration created" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Results" >> $GITHUB_STEP_SUMMARY
        if [ -d "build/reports/checkstyle" ]; then
          echo "- 📊 Reports generated successfully" >> $GITHUB_STEP_SUMMARY
          echo "- 📁 Available in build/reports/checkstyle/" >> $GITHUB_STEP_SUMMARY
          if [ -f "build/reports/checkstyle/main.html" ]; then
            echo "- 🌐 HTML report available" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "- ❌ No reports generated" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### CI Fallback" >> $GITHUB_STEP_SUMMARY
        echo "- 🛡️ Build continues even if Checkstyle fails" >> $GITHUB_STEP_SUMMARY
        echo "- 📋 Violations are reported but don't break CI" >> $GITHUB_STEP_SUMMARY
