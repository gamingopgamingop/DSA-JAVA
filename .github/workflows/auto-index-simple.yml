name: Auto Index Synchronization (Simple)

on:
  push:
    branches: [ main, develop ]
    paths:
      - '*.java'
      - '!*_Test.java'
      - '!*_Documentation.md'
      - 'scripts/generate-index.sh'
  pull_request:
    branches: [ main ]
    paths:
      - '*.java'
      - '!*_Test.java'
      - '!*_Documentation.md'
      - 'scripts/generate-index.sh'
  workflow_dispatch:  # Allow manual trigger

# Minimal permissions - just need to write content
permissions:
  contents: write          # Write to repository
  pull-requests: write    # Comment on PRs
  actions: read           # Read workflow runs

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Xmx2g -Dfile.encoding=UTF-8'

jobs:
  # Main job - check and update index
  sync-index:
    runs-on: ubuntu-latest
    name: 🔄 Sync Algorithm Index
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        
    - name: Setup Git user
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
    - name: Make script executable
      run: chmod +x scripts/generate-index.sh
      
    - name: Check current state
      id: check
      run: |
        echo "🔍 Checking current index state..."
        
        # Count actual algorithm files
        total_algorithms=$(find . -maxdepth 1 -name "*.java" ! -name "*_Test.java" | wc -l)
        echo "total-algorithms=$total_algorithms" >> $GITHUB_OUTPUT
        
        # Count current index entries
        if [[ -f "docs/INDEX.md" ]]; then
          current_entries=$(grep -c "^\- \*\*\[" docs/INDEX.md 2>/dev/null || echo "0")
        else
          current_entries=0
        fi
        echo "current-entries=$current_entries" >> $GITHUB_OUTPUT
        
        echo "📊 Current statistics:"
        echo "- Algorithm files found: $total_algorithms"
        echo "- Current index entries: $current_entries"
        
        # Check if index needs updating
        if [[ -f "docs/INDEX.md" ]] && ./scripts/generate-index.sh --check >/dev/null 2>&1; then
          echo "needs-update=false" >> $GITHUB_OUTPUT
          echo "✅ Index is up to date"
        else
          echo "needs-update=true" >> $GITHUB_OUTPUT
          echo "📝 Index needs updating"
        fi
        
    - name: Generate new index (if needed)
      if: steps.check.outputs.needs-update == 'true'
      run: |
        echo "📝 Generating new algorithm index..."
        
        # Create docs directory if it doesn't exist
        mkdir -p docs
        
        # Generate the index
        ./scripts/generate-index.sh
        
        echo "✅ Index generated successfully"
        
        # Show statistics
        echo "📊 New index statistics:"
        echo "- Total algorithms: ${{ steps.check.outputs.total-algorithms }}"
        echo "- Index entries: $(grep -c "^\- \*\*\[" docs/INDEX.md || echo "0")"
        
    - name: Show changes
      if: steps.check.outputs.needs-update == 'true'
      run: |
        echo "📋 Changes to be committed:"
        if git status --porcelain | grep -q "docs/INDEX.md"; then
          echo "Modified files:"
          git status --porcelain | grep "docs/INDEX.md"
          echo ""
          echo "Diff preview:"
          git diff docs/INDEX.md | head -50
          echo "..."
        else
          echo "No changes detected in INDEX.md"
        fi
        
    - name: Commit and push changes
      if: steps.check.outputs.needs-update == 'true'
      run: |
        echo "🚀 Committing updated index..."
        
        # Check if there are actually changes to commit
        if git status --porcelain | grep -q "docs/INDEX.md"; then
          # Add the updated index
          git add docs/INDEX.md
          
          # Commit with descriptive message
          git commit -m "🤖 Auto-update algorithm index
          
          📊 Statistics:
          - Algorithm files: ${{ steps.check.outputs.total-algorithms }}
          - Previous entries: ${{ steps.check.outputs.current-entries }}
          - Generated by: scripts/generate-index.sh
          - Timestamp: $(date '+%Y-%m-%d %H:%M:%S')
          
          [skip ci]"
          
          # Push changes
          git push
          
          echo "✅ Index updated and pushed successfully"
        else
          echo "ℹ️ No changes to commit - index was already up to date"
        fi
        
    - name: Create status file
      if: always()
      run: |
        echo "📝 Creating status file..."
        
        mkdir -p .github/workflow-status
        
        cat > .github/workflow-status/index-sync-status.md << EOF
        # Index Synchronization Status
        
        **Last Run**: $(date '+%Y-%m-%d %H:%M:%S UTC')
        **Workflow**: ${{ github.workflow }}
        **Run ID**: ${{ github.run_id }}
        **Trigger**: ${{ github.event_name }}
        
        ## Results
        - **Total Algorithm Files**: ${{ steps.check.outputs.total-algorithms }}
        - **Current Index Entries**: ${{ steps.check.outputs.current-entries }}
        - **Update Required**: ${{ steps.check.outputs.needs-update }}
        - **Status**: ${{ job.status }}
        
        ## Actions Taken
        EOF
        
        if [[ "${{ steps.check.outputs.needs-update }}" == "true" ]]; then
          echo "- ✅ Index was regenerated" >> .github/workflow-status/index-sync-status.md
          echo "- ✅ Changes committed to repository" >> .github/workflow-status/index-sync-status.md
        else
          echo "- ℹ️ No update needed - index was current" >> .github/workflow-status/index-sync-status.md
        fi
        
        echo "" >> .github/workflow-status/index-sync-status.md
        echo "---" >> .github/workflow-status/index-sync-status.md
        echo "*Status file generated by auto-index workflow*" >> .github/workflow-status/index-sync-status.md
        
        echo "✅ Status file created: .github/workflow-status/index-sync-status.md"

  # PR comment job (only for pull requests)
  pr-comment:
    runs-on: ubuntu-latest
    name: 💬 PR Comment
    needs: sync-index
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Create PR comment
      uses: actions/github-script@v6
      with:
        script: |
          const totalAlgorithms = ${{ needs.sync-index.outputs.total-algorithms || '0' }};
          const currentEntries = ${{ needs.sync-index.outputs.current-entries || '0' }};
          const needsUpdate = ${{ needs.sync-index.outputs.needs-update || 'false' }};
          
          const commentBody = `## 🔍 Algorithm Index Status
          
          ### 📊 Statistics
          - **Total Algorithm Files**: ${totalAlgorithms}
          - **Current Index Entries**: ${currentEntries}
          - **Status**: ${needsUpdate === 'true' ? '📝 Will be updated after merge' : '✅ Up to date'}
          
          ### 🔧 Next Steps
          ${needsUpdate === 'true' ? 
            '1. Merge this PR\n2. Index will be automatically updated\n3. Check docs/INDEX.md after merge' : 
            '1. No action needed\n2. Index is already synchronized'
          }
          
          ---
          *Status checked by auto-index workflow*`;

          try {
            // Find existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Algorithm Index Status')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody,
              });
              console.log('Updated existing PR comment');
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
              console.log('Created new PR comment');
            }
          } catch (error) {
            console.error('Failed to create/update PR comment:', error.message);
            // Don't fail the workflow
          }

  # Summary job
  summary:
    runs-on: ubuntu-latest
    name: 📊 Summary
    needs: [sync-index, pr-comment]
    if: always()
    
    steps:
    - name: Final Summary
      run: |
        echo "📊 Auto Index Synchronization Summary"
        echo "======================================"
        echo ""
        echo "🔄 Main Job: ${{ needs.sync-index.result }}"
        echo "💬 PR Comment: ${{ needs.pr-comment.result }}"
        echo ""
        
        if [[ "${{ needs.sync-index.result }}" == "success" ]]; then
          echo "✅ **Workflow completed successfully**"
          echo "   - Algorithm files: ${{ needs.sync-index.outputs.total-algorithms }}"
          echo "   - Index entries: ${{ needs.sync-index.outputs.current-entries }}"
          echo "   - Update needed: ${{ needs.sync-index.outputs.needs-update }}"
        else
          echo "❌ **Workflow failed**"
          echo "   Please check the job logs for details"
        fi
        
        echo ""
        echo "🔗 **Useful Links**"
        echo "- Current Index: [docs/INDEX.md](https://github.com/${{ github.repository }}/blob/main/docs/INDEX.md)"
        echo "- Workflow Status: [.github/workflow-status/index-sync-status.md](https://github.com/${{ github.repository }}/blob/main/.github/workflow-status/index-sync-status.md)"
        echo "- Script: [scripts/generate-index.sh](https://github.com/${{ github.repository }}/blob/main/scripts/generate-index.sh)"
