name: Index Update Script

on:
  workflow_dispatch:
    inputs:
      create_issue:
        description: 'Create GitHub issue if INDEX.md needs update'
        required: false
        default: 'true'
        type: boolean
      auto_update:
        description: 'Automatically update INDEX.md'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: '0 3 * * 0'  # Weekly check on Sunday at 3 AM UTC
  push:
    branches: [ main, master ]
    paths:
      - 'src/main/java/com/dsa/algorithms/**'
      - 'docs/INDEX.md'

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Set up Node.js (for advanced processing)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          npm install -g commander chalk fs-extra
      
      - name: Create index generation script
        run: |
          cat > generate-index.js << 'EOF'
          #!/usr/bin/env node
          
          const fs = require('fs-extra');
          const path = require('path');
          const chalk = require('chalk');
          const { Command } = require('commander');
          
          const program = new Command();
          
          program
            .name('generate-index')
            .description('Generate INDEX.md for DSA algorithms')
            .version('1.0.0');
          
          program
            .option('-d, --dir <path>', 'Algorithm directory path', 'src/main/java/com/dsa/algorithms')
            .option('-o, --output <path>', 'Output file path', 'docs/INDEX.md')
            .option('-f, --force', 'Force overwrite existing file', false)
            .option('-v, --verbose', 'Verbose output', false);
          
          program.parse();
          
          const options = program.opts();
          
          class IndexGenerator {
            constructor(options) {
              this.options = options;
              this.algorithms = [];
              this.categories = new Map();
            }
          
            async scanAlgorithms() {
              const algorithmDir = path.resolve(options.dir);
              
              if (!fs.existsSync(algorithmDir)) {
                console.log(chalk.yellow(`Algorithm directory not found: ${algorithmDir}`));
                return;
              }
          
              console.log(chalk.blue('Scanning algorithm files...'));
              await this.scanDirectory(algorithmDir);
              console.log(chalk.green(`Found ${this.algorithms.length} algorithm files`));
            }
          
            async scanDirectory(dir, category = 'General') {
              const items = await fs.readdir(dir);
              
              for (const item of items) {
                const itemPath = path.join(dir, item);
                const stat = await fs.stat(itemPath);
                
                if (stat.isDirectory()) {
                  const subCategory = this.formatCategory(item);
                  await this.scanDirectory(itemPath, subCategory);
                } else if (item.endsWith('.java') && !item.includes('Test')) {
                  await this.parseAlgorithmFile(itemPath, category);
                }
              }
            }
          
            async parseAlgorithmFile(filePath, category) {
              try {
                const content = await fs.readFile(filePath, 'utf8');
                const relativePath = path.relative(process.cwd(), filePath);
                const fileName = path.basename(filePath, '.java');
                
                const algorithm = {
                  name: this.extractAlgorithmName(content, fileName),
                  file: fileName,
                  path: relativePath,
                  category: category,
                  description: this.extractDescription(content),
                  timeComplexity: this.extractComplexity(content, 'Time'),
                  spaceComplexity: this.extractComplexity(content, 'Space'),
                  tags: this.extractTags(content)
                };
                
                this.algorithms.push(algorithm);
                
                if (!this.categories.has(category)) {
                  this.categories.set(category, []);
                }
                this.categories.get(category).push(algorithm);
                
                if (this.options.verbose) {
                  console.log(chalk.gray(`  Processed: ${fileName} (${category})`));
                }
              } catch (error) {
                console.log(chalk.red(`Error parsing ${filePath}: ${error.message}`));
              }
            }
          
            extractAlgorithmName(content, fileName) {
              const classMatch = content.match(/public\s+class\s+(\w+)/);
              if (classMatch) {
                return classMatch[1];
              }
              return fileName;
            }
          
            extractDescription(content) {
              const descMatch = content.match(/@Description\s+(.+)/);
              if (descMatch) {
                return descMatch[1].trim();
              }
              return 'Algorithm implementation';
            }
          
            extractComplexity(content, type) {
              const pattern = new RegExp(`@Complexity\\s+${type}:\\s*([^\\n]+)`);
              const match = content.match(pattern);
              if (match) {
                return match[1].trim();
              }
              return type === 'Time' ? 'O(n)' : 'O(1)';
            }
          
            extractTags(content) {
              const tags = [];
              const tagMatch = content.match(/@Category\\s+(.+)/);
              if (tagMatch) {
                tags.push(tagMatch[1].trim());
              }
              return tags;
            }
          
            formatCategory(folderName) {
              return folderName
                .split('-')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                .join(' ');
            }
          
            generateIndexContent() {
              const now = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
              const totalAlgorithms = this.algorithms.length;
              const totalCategories = this.categories.size;
              
              let content = `# DSA Java Project - Algorithm Index

This document provides a comprehensive index of all algorithms implemented in the DSA Java project.

## 📊 Statistics

- **Total Algorithms**: ${totalAlgorithms}
- **Categories**: ${totalCategories}
- **Last Updated**: ${now}
- **Repository**: [${process.env.GITHUB_REPOSITORY || 'DSA-JAVA'}](https://github.com/${process.env.GITHUB_REPOSITORY || 'dsa-java-project/DSA-JAVA'})

## 📚 Table of Contents

`;
              
              // Generate table of contents
              const sortedCategories = Array.from(this.categories.keys()).sort();
              for (const category of sortedCategories) {
                const anchor = category.toLowerCase().replace(/\\s+/g, '-').replace(/[^a-z0-9-]/g, '');
                content += `- [${category}](#${anchor})\\n`;
              }
              
              content += `\\n---\\n\\n`;
              
              // Generate category sections
              for (const category of sortedCategories) {
                const algorithms = this.categories.get(category).sort((a, b) => a.name.localeCompare(b.name));
                
                content += `## ${this.getCategoryEmoji(category)} ${category}\\n\\n`;
                
                for (const algo of algorithms) {
                  content += `### ${algo.name}\\n`;
                  content += `- **File**: \`${algo.file}.java\`\\n`;
                  content += `- **Path**: \`${algo.path}\`\\n`;
                  content += `- **Time Complexity**: ${algo.timeComplexity}\\n`;
                  content += `- **Space Complexity**: ${algo.spaceComplexity}\\n`;
                  content += `- **Description**: ${algo.description}\\n`;
                  content += `- **Category**: ${category}\\n`;
                  
                  if (algo.tags.length > 0) {
                    content += `- **Tags**: ${algo.tags.join(', ')}\\n`;
                  }
                  
                  content += `\\n`;
                }
                
                content += `---\\n\\n`;
              }
              
              // Add additional sections
              content += this.generateAdditionalSections();
              
              return content;
            }
          
            getCategoryEmoji(category) {
              const emojis = {
                'Sorting': '🔄',
                'Searching': '🔍',
                'Data Structures': '🏗️',
                'Graph': '🌐',
                'Dynamic Programming': '🎯',
                'Tree': '🌳',
                'String': '📝',
                'Mathematical': '🔢',
                'Greedy': '🎲',
                'Backtracking': '🔙',
                'Divide and Conquer': '✂️',
                'Hashing': '🔑',
                'Recursion': '🔄',
                'Bit Manipulation': '⚡',
                'General': '📋'
              };
              return emojis[category] || '📋';
            }
          
            generateAdditionalSections() {
              return `## 🚀 How to Add New Algorithms

1. **Create Algorithm File**: Add your algorithm to the appropriate package
2. **Add Documentation**: Include proper JavaDoc comments with @Description, @Complexity, and @Category annotations
3. **Add Tests**: Create comprehensive unit tests
4. **Update Index**: Run this script to update INDEX.md

### Algorithm Template
\`\`\`java
package com.dsa.algorithms.sorting;

/**
 * [Algorithm Name]
 * 
 * @Complexity Time: O([time complexity])
 * @Complexity Space: O([space complexity])
 * @Description [brief description]
 * @Category [algorithm category]
 */
public class [AlgorithmName] {
    // Implementation here
}
\`\`\`

## 📚 References

- [Algorithm Wikipedia](https://en.wikipedia.org/wiki/Algorithm)
- [GeeksforGeeks](https://www.geeksforgeeks.org/)
- [LeetCode](https://leetcode.com/)
- [HackerRank](https://www.hackerrank.com/)

## 🔧 Maintenance

This index is automatically generated by the \`generate-index.js\` script. To update it:

\`\`\`bash
# Generate index
node generate-index.js

# Force overwrite
node generate-index.js --force

# Custom directory
node generate-index.js --dir src/main/java/com/dsa/algorithms
\`\`\`

---

*Last updated: ${new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC'}*  
*Generated by GitHub Actions*`;
            }
          
            async generateIndex() {
              await this.scanAlgorithms();
              
              if (this.algorithms.length === 0) {
                console.log(chalk.yellow('No algorithms found to index'));
                return false;
              }
          
              const content = this.generateIndexContent();
              const outputPath = path.resolve(this.options.output);
              
              // Create output directory if it doesn't exist
              await fs.ensureDir(path.dirname(outputPath));
              
              // Check if file exists and force option is not set
              if (fs.existsSync(outputPath) && !this.options.force) {
                console.log(chalk.yellow(`File already exists: ${outputPath}`));
                console.log(chalk.gray('Use --force to overwrite'));
                return false;
              }
          
              await fs.writeFile(outputPath, content);
              console.log(chalk.green(`Index generated: ${outputPath}`));
              return true;
            }
          }
          
          async function main() {
            try {
              const generator = new IndexGenerator(options);
              const success = await generator.generateIndex();
              
              if (success) {
                console.log(chalk.green('✅ Index generation completed successfully'));
                process.exit(0);
              } else {
                console.log(chalk.yellow('⚠️  Index generation completed with warnings'));
                process.exit(1);
              }
            } catch (error) {
              console.error(chalk.red('❌ Error generating index:'), error.message);
              process.exit(1);
            }
          }
          
          if (require.main === module) {
            main();
          }
          EOF
          
          chmod +x generate-index.js
      
      - name: Check INDEX.md status
        id: check-status
        run: |
          echo "Checking INDEX.md status..."
          
          # Check if algorithm files exist
          if [ -d "src/main/java/com/dsa/algorithms" ]; then
            algorithm_count=$(find src/main/java/com/dsa/algorithms -name "*.java" -not -path "*/generated/*" | wc -l)
            echo "algorithm_count=$algorithm_count" >> $GITHUB_OUTPUT
            
            # Check if INDEX.md exists and get its modification time
            if [ -f "docs/INDEX.md" ]; then
              index_mtime=$(stat -c %Y docs/INDEX.md 2>/dev/null || echo 0)
              latest_algorithm_mtime=$(find src/main/java/com/dsa/algorithms -name "*.java" -not -path "*/generated/*" -exec stat -c %Y {} \; 2>/dev/null | sort -nr | head -1 || echo 0)
              
              echo "index_mtime=$index_mtime" >> $GITHUB_OUTPUT
              echo "latest_algorithm_mtime=$latest_algorithm_mtime" >> $GITHUB_OUTPUT
              
              if [ "$latest_algorithm_mtime" -gt "$index_mtime" ]; then
                echo "needs_update=true" >> $GITHUB_OUTPUT
                echo "INDEX.md is out of date"
              else
                echo "needs_update=false" >> $GITHUB_OUTPUT
                echo "INDEX.md is up to date"
              fi
            else
              echo "needs_update=true" >> $GITHUB_OUTPUT
              echo "INDEX.md does not exist"
            fi
          else
            echo "algorithm_count=0" >> $GITHUB_OUTPUT
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "No algorithm directory found"
          fi
      
      - name: Generate INDEX.md
        if: steps.check-status.outputs.needs_update == 'true' || github.event.inputs.auto_update == 'true'
        run: |
          echo "Generating INDEX.md..."
          node generate-index.js --force --verbose
      
      - name: Show generated content
        if: steps.check-status.outputs.needs_update == 'true' || github.event.inputs.auto_update == 'true'
        run: |
          echo "Generated INDEX.md content:"
          head -50 docs/INDEX.md
          echo "..."
          echo "Total lines: $(wc -l < docs/INDEX.md)"
      
      - name: Create GitHub issue
        if: (steps.check-status.outputs.needs_update == 'true' || github.event.inputs.create_issue == 'true') && github.event.inputs.auto_update != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Check if similar issue already exists
            const existingIssues = await github.rest.issues.listForRepo({
              owner: owner,
              repo: repo,
              state: 'open',
              labels: ['documentation', 'maintenance', 'index-update']
            });
            
            if (existingIssues.data.length > 0) {
              console.log('Issue already exists, updating with latest info...');
              const issue = existingIssues.data[0];
              
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issue.number,
                body: `### 🔄 Status Update

**Time**: ${new Date().toISOString()}  
**Trigger**: ${context.eventName}  
**Branch**: ${context.ref}  
**Algorithm Count**: ${steps.check-status.outputs.algorithm_count}

The INDEX.md file still needs updating. This is an automated reminder.

### 📊 Detection Results
- **INDEX.md exists**: ${fs.existsSync('docs/INDEX.md') ? 'Yes' : 'No'}
- **Needs Update**: ${steps.check-status.outputs.needs_update}
- **Algorithm Files**: ${steps.check-status.outputs.algorithm_count}

### 🚀 Quick Fix
Run the following command to update INDEX.md:
\`\`\`bash
node generate-index.js --force
\`\`\`

---
*Comment added by GitHub Actions*`
              });
              
              console.log('Updated existing issue:', issue.html_url);
              return;
            }
            
            // Create new issue
            const issue = await github.rest.issues.create({
              owner: owner,
              repo: repo,
              title: '📚 INDEX.md needs update',
              body: `## 📋 INDEX.md Update Required

The INDEX.md file is out of sync with the actual algorithm files.

### 📊 Current Status
- **Repository**: ${owner}/${repo}
- **Branch**: ${context.ref}
- **Trigger**: ${context.eventName}
- **Timestamp**: ${new Date().toISOString()}
- **Algorithm Files Found**: ${steps.check-status.outputs.algorithm_count}

### 🔧 Detection Results
- **INDEX.md exists**: ${fs.existsSync('docs/INDEX.md') ? 'Yes' : 'No'}
- **Needs Update**: ${steps.check-status.outputs.needs_update}
- **Latest Algorithm Modified**: ${new Date(parseInt(steps.check-status.outputs.latest_algorithm_mtime) * 1000).toISOString()}
- **INDEX.md Modified**: ${new Date(parseInt(steps.check-status.outputs.index_mtime) * 1000).toISOString()}

### 🚀 Required Actions
1. Run the index generation script to update INDEX.md
2. Verify all algorithms are properly documented
3. Check for any missing or outdated entries
4. Update the table of contents if needed

### 🛠️ Quick Fix
\`\`\`bash
# Generate updated index
node generate-index.js --force

# Or use the original script
./scripts/generate-index.sh

# Or with Gradle
./gradlew generateIndex
\`\`\`

### 📝 Notes
- This issue was automatically created by a GitHub Action
- Please run the index generation script to resolve
- Close this issue once INDEX.md is updated
- The script will automatically detect and categorize algorithms

### 🏷️ Labels
- documentation
- maintenance
- index-update
- automated

---
*Generated by GitHub Actions on ${new Date().toISOString()}*`,
              labels: ['documentation', 'maintenance', 'index-update', 'automated']
            });
            
            console.log('Created issue:', issue.data.html_url);
          github-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Commit and push changes
        if: (steps.check-status.outputs.needs_update == 'true' || github.event.inputs.auto_update == 'true') && github.event.inputs.auto_update == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/INDEX.md
          git add generate-index.js
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📚 Auto-update INDEX.md with latest algorithms

- Generated index for ${steps.check-status.outputs.algorithm_count} algorithms
- Updated by GitHub Actions
- Trigger: ${{ github.event_name }}
- Branch: ${{ github.ref }}"
            git push
          fi
      
      - name: Close issue after automatic update
        if: steps.check-status.outputs.needs_update == 'true' && github.event.inputs.auto_update == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Find and close existing index update issues
            const existingIssues = await github.rest.issues.listForRepo({
              owner: owner,
              repo: repo,
              state: 'open',
              labels: ['documentation', 'maintenance', 'index-update']
            });
            
            for (const issue of existingIssues.data) {
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issue.number,
                body: `### ✅ Issue Automatically Resolved

The INDEX.md file has been automatically updated by GitHub Actions.

**Updated at**: ${new Date().toISOString()}  
**Trigger**: ${context.eventName}  
**Branch**: ${context.ref}  
**Algorithm Count**: ${steps.check-status.outputs.algorithm_count}

### 📊 Update Summary
- INDEX.md has been regenerated with the latest algorithm files
- All algorithms have been automatically categorized
- Table of contents has been updated
- Documentation is now synchronized

This issue can be closed as the problem has been automatically resolved.

---
*Issue resolved by GitHub Actions*`
              });
              
              await github.rest.issues.update({
                owner: owner,
                repo: repo,
                issue_number: issue.number,
                state: 'closed'
              });
              
              console.log('Closed issue:', issue.html_url);
            }
          github-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Summary
        run: |
          echo "## 📊 Index Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Algorithm Files Found**: ${{ steps.check-status.outputs.algorithm_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **INDEX.md Status**: ${{ steps.check-status.outputs.needs_update == 'true' && 'Needs Update' || 'Up to Date' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Auto Update**: ${{ github.event.inputs.auto_update || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Create Issue**: ${{ github.event.inputs.create_issue || 'true' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.check-status.outputs.needs_update }}" == "true" ]; then
            echo "### 🔄 Actions Taken" >> $GITHUB_STEP_SUMMARY
            if [ "${{ github.event.inputs.auto_update }}" == "true" ]; then
              echo "- ✅ INDEX.md automatically updated" >> $GITHUB_STEP_SUMMARY
              echo "- ✅ Changes committed and pushed" >> $GITHUB_STEP_SUMMARY
              echo "- ✅ Related issues closed" >> $GITHUB_STEP_SUMMARY
            else
              echo "- 📝 GitHub issue created" >> $GITHUB_STEP_SUMMARY
              echo "- ⏳ Waiting for manual update" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "### ✅ Status" >> $GITHUB_STEP_SUMMARY
            echo "- INDEX.md is up to date" >> $GITHUB_STEP_SUMMARY
            echo "- No action required" >> $GITHUB_STEP_SUMMARY
          fi
