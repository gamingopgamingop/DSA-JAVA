name: Fix Index Permissions

on:
  workflow_dispatch:
    inputs:
      test_permissions:
        description: 'Test GitHub API permissions'
        required: false
        default: 'true'
        type: boolean
      create_test_issue:
        description: 'Create a test issue to verify permissions'
        required: false
        default: 'false'
        type: boolean

jobs:
  test-permissions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      checks: read
      actions: read
      deployments: read
      security-events: read
      statuses: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Test GitHub API permissions
        id: test-permissions
        run: |
          echo "Testing GitHub API permissions..."
          
          # Test basic repository access
          echo "Testing repository access..."
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github.v3+json" \
               https://api.github.com/repos/${{ github.repository }}
          
          # Test issues permissions
          echo "Testing issues permissions..."
          response=$(curl -s -w "%{http_code}" -o /dev/null \
               -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github.v3+json" \
               https://api.github.com/repos/${{ github.repository }}/issues)
          
          echo "Issues API response code: $response"
          
          if [ "$response" = "200" ]; then
            echo "✅ Issues API access is working"
            echo "issues_permission=granted" >> $GITHUB_OUTPUT
          else
            echo "❌ Issues API access failed with code: $response"
            echo "issues_permission=denied" >> $GITHUB_OUTPUT
          fi
          
          # Test current user info
          echo "Testing current user info..."
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github.v3+json" \
               https://api.github.com/user
      
      - name: Debug GitHub Script permissions
        uses: actions/github-script@v7
        with:
          script: |
            console.log('=== GitHub Script Debug ===');
            console.log('Repository:', context.repo.owner + '/' + context.repo.repo);
            console.log('Actor:', context.actor);
            console.log('Event:', context.eventName);
            console.log('Ref:', context.ref);
            
            // Test basic API access
            try {
              const repo = await github.rest.repos.get({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              console.log('✅ Repository access:', repo.data.name);
            } catch (error) {
              console.log('❌ Repository access failed:', error.message);
            }
            
            // Test issues API access
            try {
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 1
              });
              console.log('✅ Issues API access:', issues.data.length, 'issues found');
            } catch (error) {
              console.log('❌ Issues API access failed:', error.message);
              console.log('Status:', error.status);
              console.log('Response:', error.response?.data);
            }
            
            // Test creating an issue (dry run)
            try {
              console.log('Testing issue creation permissions...');
              const testIssue = {
                title: 'TEST ISSUE - PLEASE DELETE',
                body: 'This is a test issue to verify permissions. Please delete this issue.',
                labels: ['test']
              };
              
              // Just test the API call without actually creating
              console.log('Issue data prepared:', testIssue);
              console.log('✅ Issue creation data prepared successfully');
            } catch (error) {
              console.log('❌ Issue creation test failed:', error.message);
            }
          github-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create test issue (if requested)
        if: github.event.inputs.create_test_issue == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Creating test issue...');
            
            try {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🧪 Test Issue - Permissions Check',
                body: `## 🧪 Permissions Test Issue

This is a test issue created to verify GitHub API permissions.

### 📊 Test Information
- **Repository**: ${context.repo.owner}/${context.repo.repo}
- **Actor**: ${context.actor}
- **Event**: ${context.eventName}
- **Timestamp**: ${new Date().toISOString()}
- **Workflow**: ${context.workflow}

### 🔍 Permissions Check
- ✅ Repository access: Working
- ✅ Issues API: Working (this issue proves it)
- ✅ GitHub Script: Working
- ✅ Token: Valid

### 📝 Next Steps
1. If you see this issue, permissions are working correctly
2. You can safely delete this issue
3. The main index update workflow should now work

### 🏷️ Labels
- test
- permissions
- debug

---
*Created by GitHub Actions for permissions testing*`,
                labels: ['test', 'permissions', 'debug']
              });
              
              console.log('✅ Test issue created:', issue.data.html_url);
              console.log('Issue number:', issue.data.number);
            } catch (error) {
              console.log('❌ Failed to create test issue:', error.message);
              console.log('Status:', error.status);
              console.log('Response:', error.response?.data);
              
              // Try to create a comment instead
              try {
                console.log('Trying to create a comment on an existing issue...');
                const issues = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  per_page: 1
                });
                
                if (issues.data.length > 0) {
                  const comment = await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issues.data[0].number,
                    body: `### 🧪 Permissions Test Comment

This is a test comment to verify GitHub API permissions.

**Timestamp**: ${new Date().toISOString()}  
**Test Result**: Comment creation works!

---
*Created by GitHub Actions for permissions testing*`
                  });
                  
                  console.log('✅ Test comment created:', comment.data.html_url);
                }
              } catch (commentError) {
                console.log('❌ Failed to create comment:', commentError.message);
              }
            }
          github-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Check existing issues
        uses: actions/github-script@v7
        with:
          script: |
            console.log('=== Checking Existing Issues ===');
            
            try {
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: ['documentation', 'maintenance', 'index-update']
              });
              
              console.log('Found', issues.data.length, 'index update issues:');
              issues.data.forEach((issue, index) => {
                console.log(`${index + 1}. #${issue.number}: ${issue.title}`);
                console.log(`   Created: ${issue.created_at}`);
                console.log(`   URL: ${issue.html_url}`);
              });
              
              if (issues.data.length > 0) {
                console.log('✅ Issues API is working correctly');
              } else {
                console.log('ℹ️  No existing index update issues found');
              }
            } catch (error) {
              console.log('❌ Failed to list issues:', error.message);
              console.log('Status:', error.status);
            }
          github-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Test with different API endpoints
        uses: actions/github-script@v7
        with:
          script: |
            console.log('=== Testing Different API Endpoints ===');
            
            // Test repository metadata
            try {
              const repo = await github.rest.repos.get({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              console.log('✅ Repository metadata:', {
                name: repo.data.name,
                private: repo.data.private,
                default_branch: repo.data.default_branch
              });
            } catch (error) {
              console.log('❌ Repository metadata failed:', error.message);
            }
            
            // Test commits API
            try {
              const commits = await github.rest.repos.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 1
              });
              console.log('✅ Commits API:', commits.data.length, 'commits found');
            } catch (error) {
              console.log('❌ Commits API failed:', error.message);
            }
            
            // Test branches API
            try {
              const branches = await github.rest.repos.listBranches({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 10
              });
              console.log('✅ Branches API:', branches.data.length, 'branches found');
              branches.data.forEach(branch => {
                console.log(`  - ${branch.name}`);
              });
            } catch (error) {
              console.log('❌ Branches API failed:', error.message);
            }
            
            // Test labels API
            try {
              const labels = await github.rest.issues.listLabelsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 10
              });
              console.log('✅ Labels API:', labels.data.length, 'labels found');
              labels.data.forEach(label => {
                console.log(`  - ${label.name}`);
              });
            } catch (error) {
              console.log('❌ Labels API failed:', error.message);
            }
          github-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Summary and recommendations
        run: |
          echo "## 🔍 Permissions Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Event**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Issues Permission**: ${{ steps.test-permissions.outputs.issues_permission }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Issue Created**: ${{ github.event.inputs.create_test_issue }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📋 Recommendations" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.test-permissions.outputs.issues_permission }}" = "granted" ]; then
            echo "✅ **Permissions are working correctly**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The main index update workflow should now work properly:" >> $GITHUB_STEP_SUMMARY
            echo "- Issues API access is confirmed" >> $GITHUB_STEP_SUMMARY
            echo "- GitHub Script permissions are valid" >> $GITHUB_STEP_SUMMARY
            echo "- Token authentication is working" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Permissions need attention**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Possible solutions:" >> $GITHUB_STEP_SUMMARY
            echo "1. Check repository settings and ensure Issues are enabled" >> $GITHUB_STEP_SUMMARY
            echo "2. Verify the workflow has the correct permissions" >> $GITHUB_STEP_SUMMARY
            echo "3. Check if the repository is private and requires additional permissions" >> $GITHUB_STEP_SUMMARY
            echo "4. Ensure the GITHUB_TOKEN has the necessary scopes" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Workflow Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The workflow uses these permissions:" >> $GITHUB_STEP_SUMMARY
          echo "- \`contents: read\` - Read repository contents" >> $GITHUB_STEP_SUMMARY
          echo "- \`issues: write\` - Create and manage issues" >> $GITHUB_STEP_SUMMARY
          echo "- \`pull-requests: write\` - Create and manage PRs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. If permissions are working, run the main index update workflow" >> $GITHUB_STEP_SUMMARY
          echo "2. If not, check repository settings and workflow permissions" >> $GITHUB_STEP_SUMMARY
          echo "3. Consider using a personal access token for additional permissions" >> $GITHUB_STEP_SUMMARY
          echo "4. Test the original index update script" >> $GITHUB_STEP_SUMMARY
      
      - name: Create permissions fix documentation
        run: |
          cat > docs/PERMISSIONS_FIX.md << 'EOF'
          # GitHub Permissions Fix for Index Update Workflow

          ## 🔍 Problem
          The original GitHub Actions workflow was failing with "Resource not accessible by integration" error when trying to create issues.

          ## 🛠️ Solution
          Created a comprehensive permissions testing and fixing workflow.

          ### Key Changes Made

          #### 1. Proper Permissions Configuration
          ```yaml
          permissions:
            contents: read
            issues: write
            pull-requests: write
          ```

          #### 2. Enhanced Error Handling
          - Added comprehensive error checking
          - Added fallback mechanisms
          - Added detailed logging

          #### 3. Permissions Testing Workflow
          - Created separate workflow for testing permissions
          - Added detailed debugging information
          - Added test issue creation

          ## 🚀 Usage

          ### Test Permissions
          ```bash
          # Run permissions test
          gh workflow run fix-index-permissions.yml

          # Run with test issue creation
          gh workflow run fix-index-permissions.yml -f create_test_issue=true
          ```

          ### Run Index Update
          ```bash
          # Run main index update workflow
          gh workflow run index-update-script.yml

          # Run with automatic update
          gh workflow run index-update-script.yml -f auto_update=true
          ```

          ## 🔧 Troubleshooting

          ### Common Issues

          #### 1. "Resource not accessible by integration"
          **Cause**: Missing or incorrect permissions
          **Solution**: Ensure workflow has `issues: write` permission

          #### 2. "Repository not found"
          **Cause**: Incorrect repository name or access
          **Solution**: Verify repository name and token permissions

          #### 3. "Issues disabled"
          **Cause**: Issues are disabled in repository settings
          **Solution**: Enable Issues in repository settings

          ### Debugging Steps

          1. **Check Repository Settings**
             - Go to repository Settings
             - Ensure "Issues" is enabled
             - Check "Actions" permissions

          2. **Verify Workflow Permissions**
             - Check workflow YAML permissions section
             - Ensure required permissions are listed

          3. **Test with Permissions Workflow**
             - Run the permissions testing workflow
             - Review the debug output

          4. **Check Token Scopes**
             - Verify GITHUB_TOKEN has necessary scopes
             - Consider using PAT for additional permissions

          ## 📚 References

          - [GitHub Actions Permissions](https://docs.github.com/en/actions/security-guides/automatic-token-authentication#permissions-for-the-github_token)
          - [GitHub REST API](https://docs.github.com/en/rest)
          - [GitHub Script Action](https://github.com/actions/github-script)

          ---
          *Last updated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")*
          EOF
          
          echo "Created permissions fix documentation: docs/PERMISSIONS_FIX.md"
      
      - name: Commit permissions documentation
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/PERMISSIONS_FIX.md
          
          if git diff --staged --quiet; then
            echo "No documentation changes to commit"
          else
            git commit -m "📚 Add GitHub permissions fix documentation

- Added comprehensive permissions troubleshooting guide
- Documented common issues and solutions
- Added debugging steps and references
- Created by GitHub Actions permissions test"
            git push
          fi
