name: Create Index Update Issue

on:
  workflow_dispatch:
  schedule:
    # Run daily to check if INDEX.md needs updating
    - cron: '0 2 * * *'
  push:
    branches: [ main, master ]
    paths:
      - 'src/main/java/com/dsa/algorithms/**'
      - 'docs/INDEX.md'

jobs:
  create-issue:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    
    permissions:
      contents: read
      issues: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Check if INDEX.md needs update
        id: check-index
        run: |
          echo "Checking if INDEX.md is out of sync..."
          
          # Check if algorithm files exist
          if [ -d "src/main/java/com/dsa/algorithms" ]; then
            algorithm_count=$(find src/main/java/com/dsa/algorithms -name "*.java" -not -path "*/generated/*" | wc -l)
            echo "Found $algorithm_count algorithm files"
            
            # Check if INDEX.md exists
            if [ -f "docs/INDEX.md" ]; then
              # Simple check - compare file modification times
              index_mtime=$(stat -c %Y docs/INDEX.md 2>/dev/null || echo 0)
              latest_algorithm_mtime=$(find src/main/java/com/dsa/algorithms -name "*.java" -not -path "*/generated/*" -exec stat -c %Y {} \; 2>/dev/null | sort -nr | head -1 || echo 0)
              
              echo "INDEX.md mtime: $index_mtime"
              echo "Latest algorithm mtime: $latest_algorithm_mtime"
              
              if [ "$latest_algorithm_mtime" -gt "$index_mtime" ]; then
                echo "INDEX.md is out of date"
                echo "needs_update=true" >> $GITHUB_OUTPUT
              else
                echo "INDEX.md is up to date"
                echo "needs_update=false" >> $GITHUB_OUTPUT
              fi
            else
              echo "INDEX.md does not exist"
              echo "needs_update=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "No algorithm directory found"
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create issue if needed
        if: steps.check-index.outputs.needs_update == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Check if similar issue already exists
            const existingIssues = await github.rest.issues.listForRepo({
              owner: owner,
              repo: repo,
              state: 'open',
              labels: ['documentation', 'maintenance', 'index-update']
            });
            
            if (existingIssues.data.length > 0) {
              console.log('Issue already exists, skipping creation');
              return;
            }
            
            // Create new issue
            const issue = await github.rest.issues.create({
              owner: owner,
              repo: repo,
              title: '📚 INDEX.md needs update',
              body: `## 📋 INDEX.md Update Required

The INDEX.md file is out of sync with the actual algorithm files.

### 📊 Current Status
- **Repository**: ${owner}/${repo}
- **Branch**: ${context.ref}
- **Trigger**: ${context.eventName}
- **Timestamp**: ${new Date().toISOString()}

### 🔧 Required Actions
1. Run the index generation script to update INDEX.md
2. Verify all algorithms are properly documented
3. Check for any missing or outdated entries
4. Update the table of contents if needed

### 🚀 Quick Fix
\`\`\`bash
# Generate updated index
./scripts/generate-index.sh

# Or manually update
./gradlew generateIndex
\`\`\`

### 📝 Notes
- This issue was automatically created by a GitHub Action
- Please run the index generation script to resolve
- Close this issue once INDEX.md is updated

### 🏷️ Labels
- documentation
- maintenance
- index-update
- automated

---
*Generated by GitHub Actions on ${new Date().toISOString()}*`,
              labels: ['documentation', 'maintenance', 'index-update', 'automated']
            });
            
            console.log('Created issue:', issue.data.html_url);
          github-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Comment on existing issue
        if: steps.check-index.outputs.needs_update == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Find existing index update issues
            const existingIssues = await github.rest.issues.listForRepo({
              owner: owner,
              repo: repo,
              state: 'open',
              labels: ['documentation', 'maintenance', 'index-update']
            });
            
            if (existingIssues.data.length > 0) {
              const issue = existingIssues.data[0];
              
              // Add comment with latest information
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issue.number,
                body: `### 🔄 Status Update

**Time**: ${new Date().toISOString()}  
**Trigger**: ${context.eventName}  
**Branch**: ${context.ref}

The INDEX.md file still needs updating. This is a reminder to run the index generation script.

### 📊 Algorithm Files Status
\`\`\`
Algorithm files detected: ${steps.check-index.outputs.algorithm_count || 'Unknown'}
\`\`\`

### 🚀 Action Required
Please run the index generation script to update INDEX.md and close this issue.

---
*Comment added by GitHub Actions*`
              });
              
              console.log('Added comment to existing issue:', issue.html_url);
            }
          github-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate INDEX.md (Optional)
        if: steps.check-index.outputs.needs_update == 'true' && github.event_name == 'workflow_dispatch'
        run: |
          echo "Generating updated INDEX.md..."
          
          # Create docs directory if it doesn't exist
          mkdir -p docs
          
          # Generate INDEX.md content
          cat > docs/INDEX.md << 'EOF'
# DSA Java Project - Algorithm Index

