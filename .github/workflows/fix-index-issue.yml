*Last updated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")*  
*Generated by GitHub Actions*
EOF
          
          echo "INDEX.md generated successfully"
      
      - name: Commit INDEX.md update
        if: steps.check-index.outputs.needs_update == 'true' && github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/INDEX.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📚 Update INDEX.md with latest algorithms"
            git push
          fi
      
      - name: Close issue after automatic update
        if: steps.check-index.outputs.needs_update == 'true' && github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Find and close existing index update issues
            const existingIssues = await github.rest.issues.listForRepo({
              owner: owner,
              repo: repo,
              state: 'open',
              labels: ['documentation', 'maintenance', 'index-update']
            });
            
            for (const issue of existingIssues.data) {
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issue.number,
                body: `### ✅ Issue Resolved

The INDEX.md file has been automatically updated by GitHub Actions.

**Updated at**: ${new Date().toISOString()}  
**Trigger**: ${context.eventName}  
**Branch**: ${context.ref}

The index is now synchronized with the latest algorithm files. This issue can be closed.

---
*Issue resolved by GitHub Actions*`
              });
              
              await github.rest.issues.update({
                owner: owner,
                repo: repo,
                issue_number: issue.number,
                state: 'closed'
              });
              
              console.log('Closed issue:', issue.html_url);
            }
          github-token: ${{ secrets.GITHUB_TOKEN }}
